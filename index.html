<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shirokuma Professional</title>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-deep: #000000;
            --bg-side: #121212;
            --bg-main: #000000;
            --bg-input: #202327;
            --accent: #1d9bf0; /* X Blue */
            --gold: #d4af37;  /* Gold Check */
            --text-white: #e7e9ea;
            --text-gray: #71767b;
            --border: #2f3336;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg-deep);
            color: var(--text-white);
            display: flex; height: 100dvh; overflow: hidden;
        }

        /* --- Layout --- */
        #sidebar {
            width: 275px; background-color: var(--bg-side);
            display: flex; flex-direction: column; border-right: 1px solid var(--border);
            transition: transform 0.3s ease; z-index: 1000; flex-shrink: 0;
        }

        #main-area {
            flex-grow: 1; display: flex; flex-direction: column;
            background-color: var(--bg-main); position: relative;
        }

        /* Overlay for mobile */
        #sidebar-overlay {
            display: none; position: fixed; inset: 0; background: rgba(91, 112, 131, 0.4); z-index: 999;
        }

        @media screen and (max-width: 768px) {
            #sidebar { position: absolute; height: 100%; transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
            #sidebar.open + #sidebar-overlay { display: block; }
        }

        /* --- UI Parts --- */
        .nav-item {
            width: 100%; padding: 16px 20px; border: none; background: none;
            color: var(--text-white); text-align: left; cursor: pointer;
            font-size: 19px; display: flex; align-items: center; gap: 15px;
        }
        .nav-item:hover { background: rgba(231, 233, 234, 0.1); border-radius: 99px; }

        /* Badge SVGs */
        .badge-icon { width: 18px; height: 18px; vertical-align: middle; margin-left: 4px; }
        .gold-check { fill: var(--gold); }
        .blue-check { fill: var(--accent); }

        /* Settings View in Main Area */
        .content-view { display: none; flex-direction: column; height: 100%; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .content-view.active { display: flex; }

        .settings-card {
            background: var(--bg-side); border: 1px solid var(--border);
            border-radius: 16px; padding: 20px; margin-bottom: 20px;
        }

        /* Chat UI */
        #messages { flex-grow: 1; overflow-y: auto; }
        .msg-row { padding: 12px 16px; border-bottom: 1px solid var(--border); }
        .msg-name { font-weight: bold; font-size: 15px; color: var(--text-white); }
        .msg-id { color: var(--text-gray); font-size: 13px; font-weight: normal; }

        .chat-input-wrapper {
            padding: 10px 16px; border-top: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px;
        }
        .input-box {
            background: var(--bg-input); border-radius: 20px; padding: 8px 16px;
            flex-grow: 1; color: #fff; border: none; outline: none;
        }

        /* Modals */
        .modal {
            position: fixed; inset: 0; background: rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-box {
            background: #000; padding: 30px; border-radius: 16px; width: 90%; max-width: 400px;
            border: 1px solid var(--border); text-align: center;
        }

        .btn-action {
            background: var(--accent); color: white; border: none; padding: 10px 20px;
            border-radius: 99px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px;
        }

        /* Admin Section */
        .admin-only { border: 1px solid var(--gold); border-radius: 12px; padding: 15px; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <svg style="display:none;">
        <symbol id="icon-check" viewBox="0 0 24 24">
            <path d="M22.25 12c0-1.43-.88-2.67-2.19-3.34.46-1.39.2-2.97-.81-4.01s-2.62-1.27-4.01-.81C14.67 2.53 13.43 1.65 12 1.65s-2.67.88-3.34 2.19c-1.39-.46-2.97-.2-4.01.81s-1.27 2.62-.81 4.01C2.53 9.33 1.65 10.57 1.65 12s.88 2.67 2.19 3.34c-.46 1.39-.2 2.97.81 4.01s2.62 1.27 4.01.81c.67 1.31 1.91 2.19 3.34 2.19s2.67-.88 3.34-2.19c1.39.46 2.97.2 4.01-.81s1.27-2.62.81-4.01c1.31-.67 2.19-1.91 2.19-3.34zm-11.71 4.2l-3.53-3.53 1.41-1.41 2.12 2.12 4.96-4.96 1.41 1.41-6.37 6.37z"/>
        </symbol>
    </svg>

    <div id="name-modal" class="modal" style="display:none;">
        <div class="modal-box">
            <h2>プロフィール設定</h2>
            <input type="text" id="initial-name" class="input-box" style="width:100%" placeholder="大谷翔平">
            <button class="btn-action" onclick="saveName()">開始する</button>
        </div>
    </div>

    <aside id="sidebar">
        <div style="padding: 20px;">
            <div style="font-size: 24px; font-weight: bold;">Shirokuma</div>
            <div id="my-profile" style="margin-top:15px; display:flex; align-items:center; gap:8px;">
                <span id="display-name" style="font-weight:bold;">---</span>
                <span id="my-badges"></span>
            </div>
            <div style="color:var(--text-gray); font-size:12px;">PIN: <span id="my-pin-display"></span></div>
        </div>

        <nav style="flex-grow: 1;">
            <button class="nav-item" onclick="showView('chat-view')">🏠 ホーム</button>
            <button class="nav-item" onclick="showView('friend-view')">👥 フレンド</button>
            <button class="nav-item" onclick="showView('settings-view')">⚙️ 設定</button>
            <button class="nav-item mobile-only" style="color:var(--danger)" onclick="toggleSidebar()">✖ 閉じる</button>
        </nav>

        <div style="padding:10px; font-size:10px; color:var(--text-gray); text-align:center;">ID: <span id="my-id-display"></span></div>
    </aside>

    <main id="main-area">
        <div id="chat-view" class="content-view active">
            <header style="display:flex; align-items:center; gap:15px; margin-bottom:10px;">
                <button onclick="toggleSidebar()" style="background:none; border:none; color:#fff; font-size:24px;">≡</button>
                <h3 id="chat-title">ホーム</h3>
                <div id="chat-actions" style="display:none; margin-left:auto; gap:10px;">
                    <button class="btn-action" style="width:auto; padding:5px 15px;" onclick="sendFriendRequest()">フレンド申請</button>
                    <button class="btn-action" style="width:auto; padding:5px 15px; background:red;" onclick="location.reload()">切断</button>
                </div>
            </header>
            <div id="messages"></div>
            <div id="chat-input-area" class="chat-input-wrapper" style="display:none;">
                <button onclick="document.getElementById('chat-image').click()" style="background:none; border:none; color:var(--accent); font-size:24px;">📷</button>
                <input type="file" id="chat-image" style="display:none;" onchange="sendImage()">
                <input type="text" id="chat-text" class="input-box" placeholder="いまどうしてる？" onkeypress="if(event.key==='Enter')sendText()">
                <button onclick="sendText()" style="background:none; border:none; color:var(--accent); font-weight:bold;">送信</button>
            </div>
        </div>

        <div id="friend-view" class="content-view">
            <h2>フレンド一覧</h2>
            <div class="settings-card">
                <p>PINで新しい相手と接続：</p>
                <input type="text" id="target-pin" class="input-box" placeholder="5桁のPIN">
                <button class="btn-action" onclick="connectViaPin()">リクエストを送信</button>
            </div>
            <div id="friend-list"></div>
        </div>

        <div id="settings-view" class="content-view">
            <h2>設定</h2>
            <div class="settings-card">
                <h3>ユーザー情報</h3>
                <label>表示名</label>
                <input type="text" id="set-name" class="input-box" style="width:100%; margin-top:8px;" onchange="updateName(this.value)">
            </div>

            <div class="settings-card" id="admin-auth-card">
                <h3>管理者</h3>
                <button class="btn-action" style="background:#333" onclick="promptAdmin()">管理者モードを有効にする</button>
            </div>

            <div id="admin-panel" class="settings-card admin-only" style="display:none;">
                <h3 style="color:var(--gold)">管理者専用パネル</h3>
                <div style="margin-bottom:15px;">
                    <label>名前の色設定</label>
                    <input type="text" id="admin-color-set" class="input-box" placeholder="例: #ffd700" onchange="updateAdminColor(this.value)">
                </div>
                <div style="margin-bottom:15px;">
                    <label>現在の対話相手への操作</label>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <button class="btn-action" style="background:var(--accent)" onclick="toggleVerification(true)">認証バッジ付与</button>
                        <button class="btn-action" style="background:#555;" onclick="toggleVerification(false)">認証解除</button>
                    </div>
                </div>
                <button class="btn-action" style="background:var(--gold); color:black;" onclick="sendSystemMsg()">全体システム告知を送信</button>
            </div>
        </div>
    </main>

    <script>
        // Data
        let myId = localStorage.getItem('sh_id') || Math.floor(Math.random()*9e9+1e9).toString();
        localStorage.setItem('sh_id', myId);
        let myName = localStorage.getItem('sh_name') || "";
        let isAdmin = localStorage.getItem('sh_admin') === 'true';
        let isVerified = localStorage.getItem('sh_verified') === 'true';
        let adminColor = localStorage.getItem('sh_color') || '#ffffff';
        let friends = JSON.parse(localStorage.getItem('sh_friends') || '[]');

        // Icons
        const goldBadge = `<svg class="badge-icon gold-check"><use href="#icon-check"/></svg>`;
        const blueBadge = `<svg class="badge-icon blue-check"><use href="#icon-check"/></svg>`;

        // Peer
        const peer = new Peer('SKR_'+myId);
        const myPin = Math.floor(Math.random()*90000+10000).toString();
        const peerPin = new Peer('SKR_PIN_'+myPin);
        let activeConn = null;

        window.onload = () => {
            document.getElementById('my-id-display').textContent = myId;
            document.getElementById('my-pin-display').textContent = myPin;
            document.getElementById('set-name').value = myName;
            if(!myName) document.getElementById('name-modal').style.display='flex';
            updateUI();
            renderFriends();
        };

        function updateUI() {
            document.getElementById('display-name').textContent = myName;
            let badges = "";
            if(isAdmin) {
                badges += goldBadge;
                document.getElementById('display-name').style.color = adminColor;
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('admin-auth-card').style.display = 'none';
            }
            if(isVerified && !isAdmin) badges += blueBadge;
            document.getElementById('my-badges').innerHTML = badges;
        }

        function saveName() {
            const val = document.getElementById('initial-name').value.trim() || "大谷翔平";
            myName = val;
            localStorage.setItem('sh_name', val);
            document.getElementById('name-modal').style.display='none';
            updateUI();
        }

        function updateName(val) {
            myName = val;
            localStorage.setItem('sh_name', val);
            updateUI();
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function showView(viewId) {
            document.querySelectorAll('.content-view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            if(window.innerWidth <= 768) toggleSidebar();
        }

        // Communication
        peer.on('connection', c => {
            // 受信側のみ確認を出す (metadataがない = 外部からのリクエスト)
            if(!c.metadata?.isInitiator) {
                if(!confirm("接続リクエストを承認しますか？")) { c.close(); return; }
            }
            setupChat(c);
        });
        peerPin.on('connection', c => setupChat(c));

        function connectViaPin() {
            const pin = document.getElementById('target-pin').value;
            const c = peerPin.connect('SKR_PIN_' + pin, { metadata: { isInitiator: true } });
            setupChat(c);
        }

        function setupChat(conn) {
            activeConn = conn;
            conn.on('open', () => {
                showView('chat-view');
                document.getElementById('chat-input-area').style.display = 'flex';
                document.getElementById('chat-actions').style.display = 'flex';
                addMsg({name:'System', content:'セキュアな接続が確立されました', system:true});
            });

            conn.on('data', data => {
                if(data.type === 'msg') addMsg(data);
                if(data.type === 'verify_change') {
                    isVerified = data.status;
                    localStorage.setItem('sh_verified', isVerified);
                    updateUI();
                }
                if(data.type === 'friend_req') {
                    if(confirm(data.name + "からのフレンド申請を承認しますか？")) {
                        addFriend(data.id, data.name);
                        activeConn.send({type:'friend_confirm', id:myId, name:myName});
                    }
                }
                if(data.type === 'friend_confirm') { addFriend(data.id, data.name); alert("フレンド登録されました"); }
            });
        }

        function sendText() {
            const input = document.getElementById('chat-text');
            if(!input.value.trim() || !activeConn) return;
            const data = { 
                type: 'msg', name: myName, id: myId, content: input.value, 
                admin: isAdmin, verified: isVerified, color: adminColor 
            };
            activeConn.send(data);
            addMsg(data);
            input.value = '';
        }

        function addMsg(d) {
            const box = document.getElementById('messages');
            const row = document.createElement('div');
            row.className = 'msg-row';
            let badges = d.admin ? goldBadge : (d.verified ? blueBadge : "");
            let nameStyle = d.admin ? `style="color:${d.color}"` : "";
            
            row.innerHTML = `
                <div class="msg-meta">
                    <span class="msg-name" ${nameStyle}>${d.name}</span>${badges}
                    <span class="msg-id">@user_${d.id || 'sys'}</span>
                </div>
                <div style="margin-top:4px;">${d.content}</div>
            `;
            box.appendChild(row);
            box.scrollTop = box.scrollHeight;
        }

        // Admin Tasks
        function promptAdmin() {
            const pass = prompt("管理者パスコードを入力してください");
            if(pass === '9999999999') {
                isAdmin = true;
                localStorage.setItem('sh_admin', 'true');
                updateUI();
            } else { alert("失敗"); }
        }

        function updateAdminColor(val) {
            adminColor = val;
            localStorage.setItem('sh_color', val);
            updateUI();
        }

        function toggleVerification(status) {
            if(!activeConn) return;
            activeConn.send({type:'verify_change', status: status});
            alert(status ? "認証バッジを付与しました" : "認証を解除しました");
        }

        function sendSystemMsg() {
            const txt = prompt("システム告知内容：");
            if(txt && activeConn) {
                const data = { name:'SYSTEM', id:'ROOT', content:'📢 ' + txt, admin:true, color:'var(--gold)', type:'msg' };
                activeConn.send(data);
                addMsg(data);
            }
        }

        // Friends
        function addFriend(id, name) {
            if(!friends.some(f => f.id === id)) {
                friends.push({id, name});
                localStorage.setItem('sh_friends', JSON.stringify(friends));
                renderFriends();
            }
        }
        function renderFriends() {
            const list = document.getElementById('friend-list');
            list.innerHTML = '';
            friends.forEach(f => {
                const div = document.createElement('div');
                div.className = 'settings-card';
                div.style.display = 'flex'; div.style.justifyContent = 'space-between';
                div.innerHTML = `<span>${f.name} (@${f.id})</span><button class="btn-action" style="width:auto; margin:0;" onclick="connectToFriend('${f.id}')">接続</button>`;
                list.appendChild(div);
            });
        }
        function connectToFriend(id) {
            const c = peer.connect('SKR_'+id, { metadata: { isInitiator: true } });
            setupChat(c);
        }
        function sendFriendRequest() { activeConn.send({type:'friend_req', id:myId, name:myName}); alert("申請を送信"); }
    </script>
</body>
</html>
