<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shirokuma v4</title>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root {
            --main-color: #5865f2; /* デフォルト：紫 */
            --bg-deep: #1e1f22;
            --bg-side: #2b2d31;
            --bg-main: #313338;
            --bg-input: #383a40;
            --text-white: #f2f3f5;
            --text-gray: #b5bac1;
            --gold: #d4af37;
            --verified: #1d9bf0;
        }

        body {
            font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg-deep);
            color: var(--text-white);
            display: flex; height: 100dvh; overflow: hidden;
        }

        /* --- Layout --- */
        #sidebar {
            width: 280px; background-color: var(--bg-side);
            display: flex; flex-direction: column; transition: transform 0.3s ease;
            z-index: 1000; flex-shrink: 0; border-right: 1px solid rgba(0,0,0,0.2);
        }

        #main-area {
            flex-grow: 1; display: flex; flex-direction: column;
            background-color: var(--bg-main); position: relative;
        }

        #sidebar-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999;
        }

        @media screen and (max-width: 768px) {
            #sidebar { position: absolute; height: 100%; transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
            #sidebar.open + #sidebar-overlay { display: block; }
        }

        /* --- Sidebar UI --- */
        .brand-section { padding: 20px; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .brand-name { font-size: 22px; font-weight: 900; color: #fff; margin-bottom: 4px; }
        .my-status { display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--text-gray); }

        .nav-btn {
            width: 90%; margin: 4px auto; padding: 12px 15px; border: none; border-radius: 6px;
            background: none; color: var(--text-gray); text-align: left;
            cursor: pointer; font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 10px;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .nav-btn.active { background: var(--main-color); color: #fff; }

        /* --- Icons --- */
        .badge { width: 16px; height: 16px; vertical-align: middle; }
        .gold-check { fill: var(--gold); }
        .blue-check { fill: var(--verified); }

        /* --- Content Views --- */
        .view { display: none; flex-direction: column; height: 100%; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .view.active { display: flex; }

        .card { background: var(--bg-side); border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }

        /* --- Chat UI --- */
        #messages { flex-grow: 1; overflow-y: auto; padding: 10px 0; }
        .msg-row { padding: 8px 20px; }
        .msg-row:hover { background: rgba(0,0,0,0.1); }
        .msg-meta { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: bold; }
        .msg-content { margin-top: 4px; color: #dcddde; line-height: 1.4; word-break: break-all; }

        .input-area { padding: 10px 20px 20px; }
        .input-wrapper { background: var(--bg-input); border-radius: 8px; padding: 10px 15px; display: flex; align-items: center; gap: 12px; }
        #chat-text { flex-grow: 1; background: none; border: none; color: #fff; outline: none; font-size: 15px; }

        /* --- Form Elements --- */
        input[type="text"], input[type="password"] {
            width: 100%; padding: 10px; border-radius: 4px; border: none; background: var(--bg-deep); color: #fff; margin-top: 8px; box-sizing: border-box;
        }
        .btn-action { background: var(--main-color); color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }

        /* --- Modals --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .modal-box { background: var(--bg-main); padding: 30px; border-radius: 8px; width: 90%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>

    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <svg style="display:none;">
        <symbol id="icon-check" viewBox="0 0 24 24">
            <path d="M22.25 12c0-1.43-.88-2.67-2.19-3.34.46-1.39.2-2.97-.81-4.01s-2.62-1.27-4.01-.81C14.67 2.53 13.43 1.65 12 1.65s-2.67.88-3.34 2.19c-1.39-.46-2.97-.2-4.01.81s-1.27 2.62-.81 4.01C2.53 9.33 1.65 10.57 1.65 12s.88 2.67 2.19 3.34c-.46 1.39-.2 2.97.81 4.01s2.62 1.27 4.01.81c.67 1.31 1.91 2.19 3.34 2.19s2.67-.88 3.34-2.19c1.39.46 2.97.2 4.01-.81s1.27-2.62.81-4.01c1.31-.67 2.19-1.91 2.19-3.34zm-11.71 4.2l-3.53-3.53 1.41-1.41 2.12 2.12 4.96-4.96 1.41 1.41-6.37 6.37z"/>
        </symbol>
    </svg>

    <div id="name-modal" class="modal" style="display:none;">
        <div class="modal-box">
            <h2>Shirokuma</h2>
            <p style="color:var(--text-gray)">利用する名前を入力してください</p>
            <input type="text" id="initial-name" placeholder="大谷翔平">
            <button class="btn-action" onclick="saveName()">はじめる</button>
        </div>
    </div>

    <aside id="sidebar">
        <div class="brand-section">
            <div class="brand-name">Shirokuma</div>
            <div class="my-status">
                <span id="my-name-display" style="font-weight:bold">---</span>
                <span id="my-badges-display"></span>
            </div>
        </div>

        <nav style="flex-grow: 1; padding-top: 10px;">
            <button class="nav-btn active" onclick="showView('chat-view')">💬 チャット</button>
            <button class="nav-btn" onclick="showView('friend-view')">👥 フレンド</button>
            <button class="nav-btn" onclick="showView('settings-view')">⚙️ 設定</button>
            <button class="nav-btn mobile-only" style="color:var(--text-gray); margin-top:20px;" onclick="toggleSidebar()">✕ 閉じる</button>
        </nav>

        <div style="padding: 10px; font-size: 9px; color: #4e5058; text-align: center;">ID: <span id="my-id-display"></span></div>
    </aside>

    <main id="main-area">
        <div id="chat-view" class="view active">
            <header style="display:flex; align-items:center; gap:15px; margin-bottom:10px; flex-shrink:0;">
                <button onclick="toggleSidebar()" style="background:none; border:none; color:#fff; font-size:24px; cursor:pointer;">≡</button>
                <h3 id="chat-title" style="margin:0">チャットルーム</h3>
                <div id="chat-actions" style="display:none; margin-left:auto; gap:10px;">
                    <button class="btn-action" style="width:auto; padding:5px 15px; margin:0" onclick="sendFriendRequest()">フレンド申請</button>
                    <button class="btn-action" style="width:auto; padding:5px 15px; margin:0; background:#ed4245" onclick="location.reload()">切断</button>
                </div>
            </header>
            <div id="messages"></div>
            <div id="chat-input-area" class="input-area" style="display:none;">
                <div class="input-wrapper">
                    <button onclick="document.getElementById('chat-image').click()" style="background:none; border:none; color:var(--text-gray); font-size:20px; cursor:pointer;">⊕</button>
                    <input type="file" id="chat-image" style="display:none;" onchange="sendImage()">
                    <input type="text" id="chat-text" placeholder="メッセージを送信" onkeypress="if(event.key==='Enter')sendText()">
                    <button onclick="sendText()" style="background:none; border:none; color:var(--main-color); font-weight:bold; cursor:pointer;">送信</button>
                </div>
            </div>
        </div>

        <div id="friend-view" class="view">
            <h2>フレンド</h2>
            <div class="card">
                <h3>PIN接続</h3>
                <p style="font-size:14px; color:var(--text-gray)">相手のPINを入力して接続を開始します</p>
                <input type="text" id="target-pin" placeholder="5桁のPIN">
                <button class="btn-action" onclick="connectViaPin()">接続リクエストを送信</button>
                <p style="font-size:12px; margin-top:10px;">あなたのPIN: <strong id="my-pin-display"></strong></p>
            </div>
            <div id="friend-list"></div>
        </div>

        <div id="settings-view" class="view">
            <h2>設定</h2>
            <div class="card">
                <h3>プロフィール</h3>
                <label style="font-size:12px; color:var(--text-gray)">表示名</label>
                <input type="text" id="set-name" onchange="updateName(this.value)">
                
                <label style="font-size:12px; color:var(--text-gray); display:block; margin-top:15px;">メインカラー</label>
                <div style="display:flex; gap:10px; margin-top:8px;">
                    <input type="color" id="main-color-picker" style="height:40px; width:60px; border:none; background:none; cursor:pointer;" onchange="updateMainColor(this.value)">
                    <input type="text" id="main-color-hex" placeholder="#5865f2" style="margin:0; flex-grow:1" onchange="updateMainColor(this.value)">
                </div>
            </div>

            <div class="card" id="admin-auth-card">
                <h3>管理者設定</h3>
                <button class="btn-action" style="background:#4e5058" onclick="promptAdmin()">管理者モードを有効にする</button>
            </div>

            <div id="admin-panel" class="card" style="display:none; border:1px solid var(--gold)">
                <h3 style="color:var(--gold)">管理者パネル</h3>
                <div style="margin-bottom:15px;">
                    <label style="font-size:12px;">管理者の名前の色</label>
                    <input type="text" id="admin-color-set" placeholder="例: gold" onchange="updateAdminColor(this.value)">
                </div>
                <div style="margin-bottom:15px;">
                    <label style="font-size:12px;">対話相手の操作</label>
                    <div style="display:flex; gap:10px; margin-top:8px;">
                        <button class="btn-action" style="background:var(--verified)" onclick="toggleVerification(true)">認証付与</button>
                        <button class="btn-action" style="background:#4e5058" onclick="toggleVerification(false)">認証解除</button>
                    </div>
                </div>
                <button class="btn-action" style="background:var(--gold); color:black" onclick="sendSystemMsg()">📢 システム告知を送信</button>
            </div>
        </div>
    </main>

    <script>
        // Data & State
        let myId = localStorage.getItem('s4_id') || Math.floor(Math.random()*9e9+1e9).toString();
        localStorage.setItem('s4_id', myId);
        let myName = localStorage.getItem('s4_name') || "";
        let isAdmin = localStorage.getItem('s4_admin') === 'true';
        let isVerified = localStorage.getItem('s4_verified') === 'true';
        let mainColor = localStorage.getItem('s4_main_color') || '#5865f2';
        let adminNameColor = localStorage.getItem('s4_admin_name_color') || '#ffffff';
        let friends = JSON.parse(localStorage.getItem('s4_friends') || '[]');

        const goldBadge = `<svg class="badge gold-check"><use href="#icon-check"/></svg>`;
        const blueBadge = `<svg class="badge blue-check"><use href="#icon-check"/></svg>`;

        // Peer
        const peer = new Peer('SKR_'+myId);
        const myPin = Math.floor(Math.random()*90000+10000).toString();
        const peerPin = new Peer('SKR_PIN_'+myPin);
        let activeConn = null;

        window.onload = () => {
            document.getElementById('my-id-display').textContent = myId;
            document.getElementById('my-pin-display').textContent = myPin;
            document.getElementById('set-name').value = myName;
            document.getElementById('main-color-picker').value = mainColor;
            document.getElementById('main-color-hex').value = mainColor;
            if(!myName) document.getElementById('name-modal').style.display = 'flex';
            updateUI();
            renderFriends();
        };

        function updateUI() {
            document.getElementById('my-name-display').textContent = myName || "未設定";
            document.documentElement.style.setProperty('--main-color', mainColor);
            
            let badges = "";
            if(isAdmin) {
                badges += goldBadge;
                document.getElementById('my-name-display').style.color = adminNameColor;
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('admin-auth-card').style.display = 'none';
            } else {
                document.getElementById('my-name-display').style.color = 'inherit';
                if(isVerified) badges += blueBadge;
            }
            document.getElementById('my-badges-display').innerHTML = badges;
        }

        function saveName() {
            const val = document.getElementById('initial-name').value.trim() || "大谷翔平";
            myName = val;
            localStorage.setItem('s4_name', val);
            document.getElementById('name-modal').style.display = 'none';
            updateUI();
        }

        function updateName(val) {
            myName = val;
            localStorage.setItem('s4_name', val);
            updateUI();
            if(activeConn) activeConn.send({type:'name_update', id:myId, newName:val});
        }

        function updateMainColor(val) {
            mainColor = val;
            localStorage.setItem('s4_main_color', val);
            document.getElementById('main-color-picker').value = val;
            document.getElementById('main-color-hex').value = val;
            updateUI();
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            event.currentTarget.classList.add('active');
            if(window.innerWidth <= 768) toggleSidebar();
        }

        // Logic
        peer.on('connection', c => {
            if(!c.metadata?.isInitiator) {
                if(!confirm("接続リクエストを承認しますか？")) { c.close(); return; }
            }
            setupChat(c);
        });
        peerPin.on('connection', c => setupChat(c));

        function connectViaPin() {
            const pin = document.getElementById('target-pin').value;
            if(!pin) return;
            setupChat(peerPin.connect('SKR_PIN_'+pin, {metadata:{isInitiator:true}}));
        }

        function setupChat(conn) {
            activeConn = conn;
            conn.on('open', () => {
                showView('chat-view');
                document.getElementById('chat-input-area').style.display = 'block';
                document.getElementById('chat-actions').style.display = 'flex';
                addMsg({name:'System', content:'接続されました', system:true});
            });
            conn.on('data', data => {
                if(data.type === 'msg') addMsg(data);
                if(data.type === 'verify_change') {
                    isVerified = data.status;
                    localStorage.setItem('s4_verified', isVerified);
                    updateUI();
                }
                if(data.type === 'friend_req') {
                    if(confirm(data.name + "からのフレンド申請を承認しますか？")) {
                        addFriend(data.id, data.name);
                        activeConn.send({type:'friend_confirm', id:myId, name:myName});
                    }
                }
                if(data.type === 'friend_confirm') { addFriend(data.id, data.name); alert("フレンドになりました！"); }
                if(data.type === 'name_update') {
                    let f = friends.find(x => x.id === data.id);
                    if(f) { f.name = data.newName; renderFriends(); }
                }
            });
        }

        function sendText() {
            const input = document.getElementById('chat-text');
            if(!input.value.trim() || !activeConn) return;
            const data = { 
                type:'msg', name:myName, id:myId, content:input.value, 
                admin:isAdmin, verified:isVerified, color:adminNameColor 
            };
            activeConn.send(data);
            addMsg(data);
            input.value = '';
        }

        function addMsg(d) {
            const box = document.getElementById('messages');
            const row = document.createElement('div');
            row.className = 'msg-row';
            let badges = d.admin ? goldBadge : (d.verified ? blueBadge : "");
            let nameStyle = d.admin ? `style="color:${d.color}"` : "";
            row.innerHTML = `
                <div class="msg-meta">
                    <span ${nameStyle}>${d.name}</span>${badges}
                    <span style="font-size:11px; color:var(--text-gray); font-weight:normal;">@${d.id || 'sys'}</span>
                </div>
                <div class="msg-content">${d.content}</div>
            `;
            box.appendChild(row);
            box.scrollTop = box.scrollHeight;
        }

        // Admin & Others
        function promptAdmin() {
            if(prompt("パスコードを入力") === '9999999999') {
                isAdmin = true; localStorage.setItem('s4_admin', 'true'); updateUI();
            }
        }
        function updateAdminColor(val) { adminNameColor = val; localStorage.setItem('s4_admin_name_color', val); updateUI(); }
        function toggleVerification(status) { activeConn?.send({type:'verify_change', status}); }
        function sendSystemMsg() {
            let t = prompt("告知内容");
            if(t) {
                let d = {type:'msg', name:'SYSTEM', id:'ROOT', content:'📢 '+t, admin:true, color:'var(--gold)'};
                activeConn.send(d); addMsg(d);
            }
        }
        function addFriend(id, name) {
            if(!friends.some(f => f.id === id)) {
                friends.push({id, name}); localStorage.setItem('s4_friends', JSON.stringify(friends)); renderFriends();
            }
        }
        function renderFriends() {
            const list = document.getElementById('friend-list');
            list.innerHTML = '';
            friends.forEach(f => {
                const div = document.createElement('div');
                div.className = 'card';
                div.style.display = 'flex'; div.style.justifyContent = 'space-between'; div.style.alignItems = 'center';
                div.innerHTML = `<span>${f.name} (@${f.id})</span><button class="btn-action" style="width:auto; margin:0; padding:5px 15px;" onclick="connectToFriend('${f.id}')">接続</button>`;
                list.appendChild(div);
            });
        }
        function connectToFriend(id) { setupChat(peer.connect('SKR_'+id, {metadata:{isInitiator:true}})); }
        function sendFriendRequest() { activeConn.send({type:'friend_req', id:myId, name:myName}); alert("申請を送信"); }
    </script>
</body>
</html>
