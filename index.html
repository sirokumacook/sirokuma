<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shirokuma - 日本語版</title>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-base: #000000;
            --bg-side: #121212;
            --bg-card: #1c1c1c;
            --accent: #1d9bf0; /* 青色チェック */
            --gold: #d4af37;   /* 金色チェック */
            --text-main: #e7e9ea;
            --text-sub: #71767b;
            --border: #2f3336;
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            margin: 0; background: var(--bg-base); color: var(--text-main);
            display: flex; height: 100dvh; overflow: hidden;
        }

        /* サイドバー */
        #sidebar {
            width: 260px; background: var(--bg-side);
            display: flex; flex-direction: column; border-right: 1px solid var(--border);
            transition: 0.3s; flex-shrink: 0;
        }

        @media screen and (max-width: 768px) {
            #sidebar { position: absolute; left: -260px; height: 100%; z-index: 1000; }
            #sidebar.open { left: 0; }
        }

        .nav-btn {
            width: 100%; padding: 15px 20px; border: none; background: none;
            color: var(--text-main); text-align: left; cursor: pointer; font-size: 16px;
        }
        .nav-btn:hover { background: var(--bg-card); }
        .nav-btn.active { font-weight: bold; color: var(--accent); background: rgba(29, 155, 240, 0.1); }

        /* メインエリア */
        #main-area { flex-grow: 1; display: flex; flex-direction: column; position: relative; background: var(--bg-base); }
        .view { display: none; flex-direction: column; height: 100%; }
        .view.active { display: flex; }

        header {
            padding: 10px 15px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }

        /* チャット表示 */
        .msg-container { flex-grow: 1; overflow-y: auto; padding: 10px 0; }
        .msg-row { padding: 10px 15px; border-bottom: 1px solid #111; display: flex; gap: 12px; }
        .user-icon { width: 42px; height: 42px; border-radius: 50%; background: #333; cursor: pointer; object-fit: cover; flex-shrink: 0; }
        .msg-body { flex-grow: 1; }
        .msg-header { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
        .msg-name { font-weight: bold; cursor: pointer; }
        .msg-name:hover { text-decoration: underline; }

        /* バッジ (X風) */
        .badge { width: 16px; height: 16px; vertical-align: middle; }
        .badge-gold { fill: var(--gold); }
        .badge-blue { fill: var(--accent); }

        /* 入力エリア */
        .input-area { padding: 15px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: var(--bg-base); }
        input[type="text"], textarea {
            background: var(--bg-card); border: 1px solid var(--border); color: #fff;
            padding: 10px 15px; border-radius: 20px; outline: none; flex-grow: 1;
        }

        /* モーダル */
        .modal {
            position: fixed; inset: 0; background: rgba(255,255,255,0.1);
            display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-content {
            background: var(--bg-base); border: 1px solid var(--border);
            padding: 25px; border-radius: 15px; width: 90%; max-width: 400px;
        }

        .profile-icon-large { width: 80px; height: 80px; border-radius: 50%; background: #333; margin: 0 auto 10px; object-fit: cover; display: block; }
        .profile-bio { font-size: 14px; color: var(--text-sub); margin: 15px 0; white-space: pre-wrap; line-height: 1.5; }
        .profile-footer { font-size: 11px; padding: 10px; background: var(--bg-card); border-radius: 8px; color: var(--text-sub); }

        .btn {
            background: var(--accent); color: #fff; border: none; padding: 12px;
            border-radius: 25px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px;
        }
        .btn-sub { background: #333; }

        #id-display { font-size: 9px; color: #333; text-align: center; padding: 10px; margin-top: auto; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <svg style="display:none;">
        <symbol id="check-icon" viewBox="0 0 24 24">
            <path d="M22.25 12c0-1.43-.88-2.67-2.19-3.34.46-1.39.2-2.97-.81-4.01s-2.62-1.27-4.01-.81C14.67 2.53 13.43 1.65 12 1.65s-2.67.88-3.34 2.19c-1.39-.46-2.97-.2-4.01.81s-1.27 2.62-.81 4.01C2.53 9.33 1.65 10.57 1.65 12s.88 2.67 2.19 3.34c-.46 1.39-.2 2.97.81 4.01s2.62 1.27 4.01.81c.67 1.31 1.91 2.19 3.34 2.19s2.67-.88 3.34-2.19c1.39.46 2.97.2 4.01-.81s1.27-2.62.81-4.01c1.31-.67 2.19-1.91 2.19-3.34zm-11.71 4.2l-3.53-3.53 1.41-1.41 2.12 2.12 4.96-4.96 1.41 1.41-6.37 6.37z"/>
        </symbol>
    </svg>

    <div id="setup-modal" class="modal">
        <div class="modal-content">
            <h2 style="text-align:center; margin-top:0;">初期設定</h2>
            <div style="text-align: center;">
                <img id="setup-icon-preview" class="profile-icon-large" src="">
                <input type="file" id="icon-input" accept="image/*" style="display:none" onchange="previewIcon(this)">
                <button class="btn btn-sub" style="width:auto; font-size:12px;" onclick="document.getElementById('icon-input').click()">アイコンを選択</button>
            </div>
            <input type="text" id="setup-name" style="width:100%; box-sizing:border-box; margin-top:15px; background:var(--bg-card); border:1px solid var(--border); color:#fff; padding:10px; border-radius:10px;" placeholder="名前 (例: 大谷翔平)">
            <textarea id="setup-bio" style="width:100%; box-sizing:border-box; margin-top:10px; border-radius:10px; height:80px; background:var(--bg-card); border:1px solid var(--border); color:#fff; padding:10px;" placeholder="自己紹介"></textarea>
            <button class="btn" onclick="saveProfile()">保存して開始</button>
        </div>
    </div>

    <div id="profile-modal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div style="text-align: center;">
                <img id="p-icon" class="profile-icon-large" src="">
                <h3 id="p-name" style="margin:5px 0;"></h3>
                <div id="p-badges"></div>
            </div>
            <div id="p-bio" class="profile-bio"></div>
            <div id="p-footer" class="profile-footer"></div>
            
            <div id="admin-tools" class="hidden" style="margin-top:15px; border-top:1px solid var(--border); padding-top:10px;">
                <p style="font-size:10px; font-weight:bold; color:var(--text-sub);">管理者ツール</p>
                <button id="verify-btn" class="btn" style="background:var(--gold); color:black;">認証マークを付与</button>
            </div>
            <button class="btn btn-sub" onclick="document.getElementById('profile-modal').style.display='none'">閉じる</button>
        </div>
    </div>

    <aside id="sidebar">
        <div style="padding: 20px; border-bottom: 1px solid var(--border);">
            <div style="font-weight: bold; font-size: 20px; letter-spacing: 1px;">Shirokuma</div>
            <div id="my-short-info" style="font-size: 12px; color: var(--text-sub); margin-top: 5px;">
                <span id="my-name-display">---</span>
                <span id="my-badge-display"></span>
            </div>
        </div>
        <nav style="flex-grow: 1;">
            <button id="nav-global" class="nav-btn active" onclick="showView('global')">グローバルチャット</button>
            <button id="nav-dm" class="nav-btn" onclick="showView('dm')">個人チャット</button>
            <button id="nav-friends" class="nav-btn" onclick="showView('friends')">フレンド一覧</button>
            <button id="nav-settings" class="nav-btn" onclick="showView('settings')">設定</button>
        </nav>
        <div id="id-display">ID: <span id="my-id-text"></span></div>
    </aside>

    <main id="main-area">
        <div id="view-global" class="view active">
            <header>
                <button onclick="document.getElementById('sidebar').classList.toggle('open')" class="nav-btn" style="width:auto; padding:5px;">メニュー</button>
                <span style="font-weight:bold;">全体広場</span>
                <span id="global-status" style="font-size:10px; color:var(--accent);">接続中...</span>
            </header>
            <div id="messages-global" class="msg-container"></div>
            <div class="input-area">
                <input type="text" id="input-global" placeholder="メッセージを入力" onkeypress="if(event.key==='Enter')sendGlobal()">
                <button onclick="sendGlobal()" class="btn" style="width:auto; margin:0; padding:0 20px;">送信</button>
            </div>
        </div>

        <div id="view-dm" class="view">
            <header>
                <button onclick="document.getElementById('sidebar').classList.toggle('open')" class="nav-btn" style="width:auto; padding:5px;">メニュー</button>
                <span id="dm-title">個人チャット</span>
                <button onclick="location.reload()" class="btn-sub" style="font-size:10px; border-radius:5px; padding:2px 5px; color:#fff; border:none;">切断</button>
            </header>
            
            <div id="dm-init" style="padding:40px 20px; text-align:center;">
                <div style="color:var(--text-sub); margin-bottom:15px;">相手のPINを入力して接続します</div>
                <input type="text" id="target-pin" style="width:180px; text-align:center; font-size:24px; letter-spacing:4px;" placeholder="00000" maxlength="5">
                <button class="btn" style="width:200px; margin:20px auto;" onclick="connectViaPin()">接続する</button>
                <div style="margin-top:20px; font-size:13px; color:var(--text-sub);">あなたのPIN: <strong id="my-pin-display" style="color:#fff;">-----</strong></div>
            </div>

            <div id="messages-dm" class="msg-container hidden"></div>
            <div id="dm-input-area" class="input-area hidden">
                <input type="text" id="input-dm" placeholder="メッセージを入力" onkeypress="if(event.key==='Enter')sendDM()">
                <button onclick="sendDM()" class="btn" style="width:auto; margin:0; padding:0 20px;">送信</button>
            </div>
        </div>

        <div id="view-friends" class="view">
            <header><span style="font-weight:bold;">フレンド</span></header>
            <div id="friend-list" style="padding:10px;"></div>
        </div>

        <div id="view-settings" class="view">
            <header><span style="font-weight:bold;">設定</span></header>
            <div style="padding:20px;">
                <div style="background:var(--bg-card); padding:15px; border-radius:15px; border:1px solid var(--border);">
                    <p style="margin-top:0;">プロフィールの編集</p>
                    <button class="btn btn-sub" onclick="openSetup()">変更画面を開く</button>
                </div>
                <div style="margin-top:20px; border-top:1px solid #333; padding-top:20px;">
                    <button class="btn btn-sub" style="font-size:12px; color:#444;" onclick="promptAdmin()">管理者認証</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- データ管理 ---
        let userData = JSON.parse(localStorage.getItem('sk_user') || '{"name":"","bio":"","icon":"","id":"","isAdmin":false,"isVerified":false}');
        let friends = JSON.parse(localStorage.getItem('sk_friends') || '[]');
        let verifiedList = JSON.parse(localStorage.getItem('sk_verified_ids') || '[]');

        if (!userData.id) {
            userData.id = Math.floor(Math.random() * 9e9 + 1e9).toString();
            saveData();
        }

        function saveData() {
            localStorage.setItem('sk_user', JSON.stringify(userData));
            localStorage.setItem('sk_friends', JSON.stringify(friends));
            localStorage.setItem('sk_verified_ids', JSON.stringify(verifiedList));
        }

        const goldBadge = `<svg class="badge badge-gold"><use href="#check-icon"/></svg>`;
        const blueBadge = `<svg class="badge badge-blue"><use href="#check-icon"/></svg>`;

        // --- 通信コア (i-FILTER回避用設定) ---
        const peerConfig = {
            config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] }
        };

        const myPeer = new Peer('SKR_' + userData.id, peerConfig);
        const myPin = Math.floor(Math.random() * 90000 + 10000).toString();
        const pinPeer = new Peer('SKR_PIN_' + myPin, peerConfig);
        
        let globalConnPool = [];
        let activeDM = null;

        window.onload = () => {
            document.getElementById('my-id-text').textContent = userData.id;
            document.getElementById('my-pin-display').textContent = myPin;
            if (!userData.name) openSetup();
            updateMyUI();
            renderFriends();
            connectGlobal();
        };

        function updateMyUI() {
            document.getElementById('my-name-display').textContent = userData.name;
            let badges = userData.isAdmin ? goldBadge : (userData.isVerified ? blueBadge : "");
            document.getElementById('my-badge-display').innerHTML = badges;
            if (userData.isAdmin) document.getElementById('my-name-display').style.color = "var(--gold)";
        }

        function openSetup() {
            document.getElementById('setup-name').value = userData.name || "大谷翔平";
            document.getElementById('setup-bio').value = userData.bio;
            document.getElementById('setup-icon-preview').src = userData.icon || "";
            document.getElementById('setup-modal').style.display = 'flex';
        }

        function previewIcon(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('setup-icon-preview').src = e.target.result;
                    userData.icon = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function saveProfile() {
            userData.name = document.getElementById('setup-name').value.trim() || "大谷翔平";
            userData.bio = document.getElementById('setup-bio').value.trim();
            saveData();
            location.reload();
        }

        function showUserProfile(data) {
            const m = document.getElementById('profile-modal');
            document.getElementById('p-icon').src = data.icon || "";
            document.getElementById('p-name').textContent = data.name;
            document.getElementById('p-bio').textContent = data.bio || "自己紹介はありません";
            
            let badges = "";
            let footer = "";
            if (data.isAdmin) {
                badges += goldBadge + ' <span style="color:var(--gold); font-size:10px;">管理者</span>';
                footer = "このアカウントは管理者が所有しています";
            } else if (data.isVerified) {
                badges += blueBadge + ' <span style="color:var(--accent); font-size:10px;">認証済み</span>';
                footer = "このアカウントは管理者によって認証されています";
            }
            document.getElementById('p-badges').innerHTML = badges;
            document.getElementById('p-footer').textContent = footer;

            const tools = document.getElementById('admin-tools');
            if (userData.isAdmin && userData.id !== data.id) {
                tools.classList.remove('hidden');
                const vBtn = document.getElementById('verify-btn');
                const isVer = verifiedList.includes(data.id);
                vBtn.textContent = isVer ? "認証を解除する" : "認証マークを付与する";
                vBtn.onclick = () => {
                    if (isVer) verifiedList = verifiedList.filter(id => id !== data.id);
                    else verifiedList.push(data.id);
                    saveData();
                    if (activeDM) activeDM.send({type:'verify_sync', list: verifiedList});
                    alert("更新しました");
                    m.style.display = 'none';
                };
            } else { tools.classList.add('hidden'); }
            m.style.display = 'flex';
        }

        // --- 通信ロジック ---
        myPeer.on('connection', conn => {
            if (conn.metadata?.isGlobal) { setupGlobalConn(conn); return; }
            if (confirm(conn.metadata?.name + "から接続リクエストがあります。承認しますか？")) setupDM(conn);
        });
        pinPeer.on('connection', conn => setupDM(conn));

        function connectViaPin() {
            const pin = document.getElementById('target-pin').value;
            const conn = myPeer.connect('SKR_PIN_' + pin, { metadata: { name: userData.name, initiator: true } });
            setupDM(conn);
        }

        function setupDM(conn) {
            activeDM = conn;
            conn.on('open', () => {
                document.getElementById('dm-init').classList.add('hidden');
                document.getElementById('messages-dm').classList.remove('hidden');
                document.getElementById('dm-input-area').classList.remove('hidden');
                addMsg('dm', {name: 'システム', content: '接続されました', system: true});
                conn.send({type:'profile_sync', data: userData});
                if(userData.isAdmin) conn.send({type:'verify_sync', list: verifiedList});
            });
            conn.on('data', data => {
                if (data.type === 'msg') addMsg('dm', data);
                if (data.type === 'profile_sync') {
                    activeDM.peerData = data.data;
                    let f = friends.find(x => x.id === data.data.id);
                    if (!f) { friends.push(data.data); saveData(); renderFriends(); }
                }
                if (data.type === 'verify_sync') {
                    userData.isVerified = data.list.includes(userData.id);
                    saveData(); updateMyUI();
                }
            });
        }

        // --- グローバル ---
        function connectGlobal() {
            const relayId = 'SKR_GLOBAL_RELAY_v4';
            const conn = myPeer.connect(relayId, { metadata: { isGlobal: true, name: userData.name } });
            setupGlobalConn(conn);
            const relay = new Peer(relayId, peerConfig);
            relay.on('connection', c => setupGlobalConn(c));
            document.getElementById('global-status').textContent = "オンライン";
        }

        function setupGlobalConn(conn) {
            if (!globalConnPool.find(c => c.peer === conn.peer)) {
                globalConnPool.push(conn);
                conn.on('data', data => { if (data.type === 'global_msg') addMsg('global', data); });
            }
        }

        function sendGlobal() {
            const input = document.getElementById('input-global');
            if (!input.value.trim()) return;
            const data = { type:'global_msg', content:input.value, name:userData.name, icon:userData.icon, id:userData.id, isAdmin:userData.isAdmin, isVerified:userData.isVerified };
            globalConnPool.forEach(c => c.send(data));
            addMsg('global', data);
            input.value = "";
        }

        function sendDM() {
            const input = document.getElementById('input-dm');
            if (!input.value.trim() || !activeDM) return;
            const data = { type:'msg', content:input.value, name:userData.name, icon:userData.icon, id:userData.id, isAdmin:userData.isAdmin, isVerified:userData.isVerified };
            activeDM.send(data);
            addMsg('dm', data);
            input.value = "";
        }

        function addMsg(target, data) {
            const container = document.getElementById('messages-' + target);
            const row = document.createElement('div');
            row.className = 'msg-row';
            const badge = data.isAdmin ? goldBadge : (data.isVerified ? blueBadge : "");
            const nameColor = data.isAdmin ? "var(--gold)" : "var(--text-main)";
            
            row.innerHTML = `
                <img src="${data.icon || ''}" class="user-icon" onclick='showUserProfile(${JSON.stringify(data)})'>
                <div class="msg-body">
                    <div class="msg-header">
                        <span class="msg-name" style="color:${nameColor}" onclick='showUserProfile(${JSON.stringify(data)})'>${data.name}</span>
                        ${badge}
                        <span style="font-size:9px; color:var(--text-sub); margin-left:5px;">@${data.id || 'sys'}</span>
                    </div>
                    <div style="font-size:15px; line-height:1.4;">${data.content}</div>
                </div>
            `;
            container.appendChild(row);
            container.scrollTop = container.scrollHeight;
        }

        function renderFriends() {
            const list = document.getElementById('friend-list');
            list.innerHTML = friends.length === 0 ? '<div style="color:var(--text-sub); text-align:center; padding:20px;">フレンドはいません</div>' : '';
            friends.forEach(f => {
                const div = document.createElement('div');
                div.className = 'msg-row';
                div.style.alignItems = 'center';
                div.innerHTML = `
                    <img src="${f.icon || ''}" class="user-icon" onclick='showUserProfile(${JSON.stringify(f)})'>
                    <div style="flex-grow:1; font-weight:bold;" onclick='showUserProfile(${JSON.stringify(f)})'>${f.name}</div>
                    <button class="btn" style="width:auto; margin:0; padding:5px 15px; font-size:12px;" onclick="startDM('${f.id}')">話す</button>
                `;
                list.appendChild(div);
            });
        }

        function showView(v) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            document.getElementById('nav-' + v).classList.add('active');
            if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
        }

        function promptAdmin() {
            if (prompt("管理者パスコードを入力してください") === '9999999999') {
                userData.isAdmin = true; saveData();
                alert("管理者として認証されました");
                location.reload();
            }
        }
        function startDM(id) {
            showView('dm');
            const conn = myPeer.connect('SKR_' + id, { metadata: { name: userData.name, initiator: true } });
            setupDM(conn);
        }
    </script>
</body>
</html>
