<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shirokuma Professional</title>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-black: #000000;
            --bg-dark: #121212;
            --bg-card: #1c1c1c;
            --accent: #1d9bf0;
            --gold: #d4af37;
            --text-main: #e7e9ea;
            --text-sub: #71767b;
            --border: #2f3336;
        }

        body {
            font-family: sans-serif;
            margin: 0; background: var(--bg-black); color: var(--text-main);
            display: flex; height: 100dvh; overflow: hidden;
        }

        /* サイドバー */
        #sidebar {
            width: 260px; background: var(--bg-black);
            display: flex; flex-direction: column; border-right: 1px solid var(--border);
            transition: 0.3s; flex-shrink: 0;
        }

        @media screen and (max-width: 768px) {
            #sidebar { position: absolute; left: -260px; height: 100%; z-index: 1000; }
            #sidebar.open { left: 0; }
        }

        .nav-btn {
            width: 100%; padding: 15px 20px; border: none; background: none;
            color: var(--text-main); text-align: left; cursor: pointer; font-size: 16px;
        }
        .nav-btn:hover { background: var(--bg-card); }
        .nav-btn.active { font-weight: bold; color: var(--accent); }

        /* メインエリア */
        #main-area { flex-grow: 1; display: flex; flex-direction: column; position: relative; }

        .view { display: none; flex-direction: column; height: 100%; }
        .view.active { display: flex; }

        header {
            padding: 10px 15px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }

        /* チャットエリア */
        #messages-global, #messages-dm { flex-grow: 1; overflow-y: auto; padding: 10px 0; }
        .msg-row { padding: 8px 15px; border-bottom: 1px solid #111; display: flex; gap: 12px; }
        .user-icon { width: 40px; height: 40px; border-radius: 50%; background: #333; cursor: pointer; object-fit: cover; flex-shrink: 0; }
        .msg-body { flex-grow: 1; }
        .msg-header { display: flex; align-items: center; gap: 5px; margin-bottom: 2px; }
        .msg-name { font-weight: bold; cursor: pointer; }
        .msg-name:hover { text-decoration: underline; }

        /* バッジ */
        .badge { font-size: 10px; font-weight: bold; padding: 1px 4px; border-radius: 2px; }
        .badge-gold { color: var(--gold); border: 1px solid var(--gold); }
        .badge-blue { color: var(--accent); border: 1px solid var(--accent); }

        /* 入力欄 */
        .input-area { padding: 10px 15px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        input[type="text"], textarea {
            background: var(--bg-card); border: 1px solid var(--border); color: #fff;
            padding: 8px 12px; border-radius: 20px; outline: none;
        }

        /* モーダル */
        .modal {
            position: fixed; inset: 0; background: rgba(255,255,255,0.1);
            display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-content {
            background: var(--bg-black); border: 1px solid var(--border);
            padding: 25px; border-radius: 15px; width: 90%; max-width: 400px;
        }

        /* プロフィール用 */
        .profile-header { text-align: center; margin-bottom: 15px; }
        .profile-icon-large { width: 80px; height: 80px; border-radius: 50%; background: #333; margin: 0 auto 10px; object-fit: cover; }
        .profile-bio { font-size: 14px; color: var(--text-sub); margin: 10px 0; white-space: pre-wrap; }
        .profile-desc { font-size: 11px; padding: 8px; background: var(--bg-card); border-radius: 5px; margin-top: 10px; }

        .btn {
            background: var(--accent); color: #fff; border: none; padding: 10px;
            border-radius: 20px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px;
        }
        .btn-sub { background: #333; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="setup-modal" class="modal">
        <div class="modal-content">
            <h2 id="setup-title">ACCOUNT SETUP</h2>
            <div style="text-align: center;">
                <img id="setup-icon-preview" class="profile-icon-large" src="" alt="">
                <input type="file" id="icon-input" accept="image/*" style="display:none" onchange="previewIcon(this)">
                <button class="btn btn-sub" style="width:auto; font-size:12px;" onclick="document.getElementById('icon-input').click()">UPLOAD ICON</button>
            </div>
            <input type="text" id="setup-name" class="input-area" style="width:100%; box-sizing:border-box; margin-top:15px;" placeholder="NAME">
            <textarea id="setup-bio" class="input-area" style="width:100%; box-sizing:border-box; margin-top:10px; border-radius:10px; height:80px;" placeholder="BIO"></textarea>
            <button class="btn" onclick="saveProfile()">SAVE</button>
        </div>
    </div>

    <div id="profile-modal" class="modal" onclick="closeModal(this)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="profile-header">
                <img id="p-icon" class="profile-icon-large" src="">
                <h3 id="p-name"></h3>
                <div id="p-badges"></div>
            </div>
            <div id="p-bio" class="profile-bio"></div>
            <div id="p-footer" class="profile-desc"></div>
            
            <div id="admin-tools" class="hidden" style="margin-top:15px; border-top:1px solid var(--border); padding-top:10px;">
                <p style="font-size:10px; font-weight:bold;">ADMIN TOOLS</p>
                <button id="verify-btn" class="btn" style="background:var(--gold); color:black;">VERIFY USER</button>
            </div>
            <button class="btn btn-sub" onclick="closeModal(document.getElementById('profile-modal'))">CLOSE</button>
        </div>
    </div>

    <aside id="sidebar">
        <div style="padding: 20px; border-bottom: 1px solid var(--border);">
            <div style="font-weight: bold; font-size: 20px; letter-spacing: 1px;">SHIROKUMA</div>
            <div style="font-size: 11px; color: var(--text-sub); margin-top: 5px;">ID: <span id="my-id-display"></span></div>
        </div>
        <nav style="flex-grow: 1;">
            <button id="nav-global" class="nav-btn active" onclick="showView('global')">GLOBAL CHAT</button>
            <button id="nav-dm" class="nav-btn" onclick="showView('dm')">DIRECT MESSAGE</button>
            <button id="nav-friends" class="nav-btn" onclick="showView('friends')">FRIENDS</button>
            <button id="nav-settings" class="nav-btn" onclick="showView('settings')">SETTINGS</button>
        </nav>
    </aside>

    <main id="main-area">
        <div id="view-global" class="view active">
            <header>
                <button onclick="toggleSidebar()" class="nav-btn" style="width:auto; padding:5px;">MENU</button>
                <span>GLOBAL</span>
                <span id="global-status" style="font-size:10px; color:var(--accent);">CONNECTING...</span>
            </header>
            <div id="messages-global"></div>
            <div class="input-area">
                <input type="text" id="input-global" style="flex-grow:1;" placeholder="MESSAGE" onkeypress="if(event.key==='Enter')sendGlobal()">
                <button onclick="sendGlobal()" class="btn" style="width:auto; margin:0; padding:5px 15px;">SEND</button>
            </div>
        </div>

        <div id="view-dm" class="view">
            <header>
                <button onclick="toggleSidebar()" class="nav-btn" style="width:auto; padding:5px;">MENU</button>
                <span id="dm-target-name">DIRECT MESSAGE</span>
                <button onclick="disconnectDM()" class="btn-sub badge" style="width:auto;">DISCONNECT</button>
            </header>
            
            <div id="dm-init" style="padding:20px; text-align:center;">
                <div class="profile-desc" style="margin-bottom:20px;">ENTER PIN TO CONNECT</div>
                <input type="text" id="target-pin" class="input-box" style="width:200px; text-align:center; font-size:20px;" placeholder="00000" maxlength="5">
                <button class="btn" style="width:200px;" onclick="connectViaPin()">CONNECT</button>
                <div style="margin-top:20px; font-size:12px; color:var(--text-sub);">YOUR PIN: <strong id="my-pin-display">-----</strong></div>
            </div>

            <div id="messages-dm" class="hidden"></div>
            <div id="dm-input-area" class="input-area hidden">
                <input type="text" id="input-dm" style="flex-grow:1;" placeholder="MESSAGE" onkeypress="if(event.key==='Enter')sendDM()">
                <button onclick="sendDM()" class="btn" style="width:auto; margin:0; padding:5px 15px;">SEND</button>
            </div>
        </div>

        <div id="view-friends" class="view">
            <header><span>FRIENDS</span></header>
            <div id="friend-list" style="padding:15px;"></div>
        </div>

        <div id="view-settings" class="view">
            <header><span>SETTINGS</span></header>
            <div style="padding:20px;">
                <button class="btn btn-sub" onclick="openSetup()">EDIT PROFILE</button>
                <button class="btn btn-sub" style="margin-top:10px;" onclick="promptAdmin()">ADMIN LOGIN</button>
            </div>
        </div>
    </main>

    <script>
        // --- データ管理 ---
        let userData = JSON.parse(localStorage.getItem('sk_user') || '{"name":"","bio":"","icon":"","id":"","isAdmin":false,"isVerified":false}');
        let friends = JSON.parse(localStorage.getItem('sk_friends') || '[]');
        let verifiedList = JSON.parse(localStorage.getItem('sk_verified_ids') || '[]'); // 管理者用: 認証済みIDリスト

        if (!userData.id) {
            userData.id = Math.floor(Math.random() * 9e9 + 1e9).toString();
            saveData();
        }

        function saveData() {
            localStorage.setItem('sk_user', JSON.stringify(userData));
            localStorage.setItem('sk_friends', JSON.stringify(friends));
            localStorage.setItem('sk_verified_ids', JSON.stringify(verifiedList));
        }

        // --- 通信設定 ---
        const peerConfig = {
            config: {
                'iceServers': [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            },
            debug: 1
        };

        const myPeer = new Peer('SKR_' + userData.id, peerConfig);
        const myPin = Math.floor(Math.random() * 90000 + 10000).toString();
        const pinPeer = new Peer('SKR_PIN_' + myPin, peerConfig);
        
        let globalConnPool = []; // グローバルチャットの簡易実装用
        let activeDM = null;

        // --- 初期化 ---
        window.onload = () => {
            document.getElementById('my-id-display').textContent = userData.id;
            document.getElementById('my-pin-display').textContent = myPin;
            if (!userData.name) openSetup();
            updateUI();
            renderFriends();
            connectToGlobal();
        };

        function updateUI() {
            document.getElementById('nav-settings').textContent = userData.isAdmin ? "SETTINGS (ADMIN)" : "SETTINGS";
        }

        // --- プロフィール関連 ---
        function openSetup() {
            document.getElementById('setup-name').value = userData.name;
            document.getElementById('setup-bio').value = userData.bio;
            document.getElementById('setup-icon-preview').src = userData.icon || "";
            document.getElementById('setup-modal').style.display = 'flex';
        }

        function previewIcon(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('setup-icon-preview').src = e.target.result;
                    userData.icon = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function saveProfile() {
            userData.name = document.getElementById('setup-name').value.trim() || "USER";
            userData.bio = document.getElementById('setup-bio').value.trim();
            saveData();
            document.getElementById('setup-modal').style.display = 'none';
            alert("PROFILE SAVED");
            location.reload();
        }

        function showUserProfile(data) {
            const m = document.getElementById('profile-modal');
            document.getElementById('p-icon').src = data.icon || "";
            document.getElementById('p-name').textContent = data.name;
            document.getElementById('p-bio').textContent = data.bio || "NO BIO";
            
            let badges = "";
            let footer = "";
            if (data.isAdmin) {
                badges += '<span class="badge badge-gold">OWNER</span>';
                footer = "THIS ACCOUNT IS OWNED BY AN ADMINISTRATOR";
            } else if (data.isVerified) {
                badges += '<span class="badge badge-blue">VERIFIED</span>';
                footer = "THIS ACCOUNT IS VERIFIED BY AN ADMINISTRATOR";
            }
            document.getElementById('p-badges').innerHTML = badges;
            document.getElementById('p-footer').textContent = footer;

            // 管理者ツール
            const tools = document.getElementById('admin-tools');
            if (userData.isAdmin && userData.id !== data.id) {
                tools.classList.remove('hidden');
                const vBtn = document.getElementById('verify-btn');
                const isAlreadyVer = verifiedList.includes(data.id);
                vBtn.textContent = isAlreadyVer ? "REVOKE VERIFICATION" : "VERIFY USER";
                vBtn.onclick = () => toggleVerifyUser(data.id);
            } else {
                tools.classList.add('hidden');
            }
            m.style.display = 'flex';
        }

        function toggleVerifyUser(targetId) {
            if (verifiedList.includes(targetId)) {
                verifiedList = verifiedList.filter(id => id !== targetId);
            } else {
                verifiedList.push(targetId);
            }
            saveData();
            // リアルタイム反映
            if (activeDM) activeDM.send({type:'verify_sync', list: verifiedList});
            alert("VERIFICATION UPDATED");
            closeModal(document.getElementById('profile-modal'));
        }

        // --- 通信コア ---
        myPeer.on('connection', conn => handleIncoming(conn));
        pinPeer.on('connection', conn => handleIncoming(conn));

        function handleIncoming(conn) {
            if (conn.metadata?.isGlobal) {
                setupGlobalConn(conn);
                return;
            }
            if (confirm("CONNECT REQUEST FROM " + (conn.metadata?.name || "UNKNOWN") + "?")) {
                setupDM(conn);
            } else {
                conn.close();
            }
        }

        function connectViaPin() {
            const pin = document.getElementById('target-pin').value;
            const conn = myPeer.connect('SKR_PIN_' + pin, { metadata: { name: userData.name, initiator: true } });
            setupDM(conn);
        }

        function setupDM(conn) {
            activeDM = conn;
            conn.on('open', () => {
                document.getElementById('dm-init').classList.add('hidden');
                document.getElementById('messages-dm').classList.remove('hidden');
                document.getElementById('dm-input-area').classList.remove('hidden');
                addMsg('dm', {name: 'SYSTEM', content: 'CONNECTED', system: true});
                
                // 初回にプロフィールを交換
                conn.send({type:'profile_sync', data: userData});
                
                // 管理者の場合、認証リストを同期
                if(userData.isAdmin) conn.send({type:'verify_sync', list: verifiedList});
            });

            conn.on('data', data => {
                if (data.type === 'msg') addMsg('dm', data);
                if (data.type === 'profile_sync') {
                    // 相手の情報を一時保存/更新
                    let friend = friends.find(f => f.id === data.data.id);
                    if (friend) {
                        Object.assign(friend, data.data);
                        saveData();
                        renderFriends();
                    }
                    activeDM.peerData = data.data; // プロフィール表示用に保持
                }
                if (data.type === 'verify_sync') {
                    // 管理者から送られてきた認証リストに基づいて自分の状態を更新
                    if (data.list.includes(userData.id)) {
                        userData.isVerified = true;
                    } else {
                        userData.isVerified = false;
                    }
                    saveData();
                    updateUI();
                }
            });
        }

        // --- グローバルチャット ---
        // ※ サーバーレスのため、特定の固定IDに接続を試みる「簡易メッシュ」方式
        function connectToGlobal() {
            const globalId = 'SKR_GLOBAL_RELAY_v4';
            const conn = myPeer.connect(globalId, { metadata: { isGlobal: true, name: userData.name } });
            setupGlobalConn(conn);
            
            // 自分がリレーになるための待機（誰かが既にリレーなら失敗するが問題ない）
            const relay = new Peer(globalId, peerConfig);
            relay.on('connection', c => setupGlobalConn(c));
            
            document.getElementById('global-status').textContent = "ONLINE";
        }

        function setupGlobalConn(conn) {
            if (!globalConnPool.find(c => c.peer === conn.peer)) {
                globalConnPool.push(conn);
                conn.on('data', data => {
                    if (data.type === 'global_msg') addMsg('global', data);
                });
            }
        }

        function sendGlobal() {
            const input = document.getElementById('input-global');
            if (!input.value.trim()) return;
            const data = { 
                type: 'global_msg', content: input.value, 
                name: userData.name, icon: userData.icon, id: userData.id,
                isAdmin: userData.isAdmin, isVerified: userData.isVerified 
            };
            globalConnPool.forEach(c => c.send(data));
            addMsg('global', data);
            input.value = "";
        }

        function sendDM() {
            const input = document.getElementById('input-dm');
            if (!input.value.trim() || !activeDM) return;
            const data = { 
                type: 'msg', content: input.value, 
                name: userData.name, icon: userData.icon, id: userData.id,
                isAdmin: userData.isAdmin, isVerified: userData.isVerified 
            };
            activeDM.send(data);
            addMsg('dm', data);
            input.value = "";
        }

        // --- UI 操作 ---
        function addMsg(target, data) {
            const container = document.getElementById('messages-' + target);
            const row = document.createElement('div');
            row.className = 'msg-row';
            
            const badge = data.isAdmin ? '<span class="badge badge-gold">OWNER</span>' : (data.isVerified ? '<span class="badge badge-blue">VERIFIED</span>' : "");
            
            row.innerHTML = `
                <img src="${data.icon || ''}" class="user-icon" onclick='showUserProfile(${JSON.stringify(data)})'>
                <div class="msg-body">
                    <div class="msg-header">
                        <span class="msg-name" onclick='showUserProfile(${JSON.stringify(data)})'>${data.name}</span>
                        ${badge}
                        <span style="font-size:9px; color:var(--text-sub);">@${data.id || 'SYS'}</span>
                    </div>
                    <div>${data.content}</div>
                </div>
            `;
            container.appendChild(row);
            container.scrollTop = container.scrollHeight;
        }

        function renderFriends() {
            const list = document.getElementById('friend-list');
            list.innerHTML = friends.length === 0 ? '<div class="profile-desc">NO FRIENDS YET</div>' : '';
            friends.forEach(f => {
                const div = document.createElement('div');
                div.className = 'msg-row';
                div.style.alignItems = 'center';
                div.innerHTML = `
                    <img src="${f.icon || ''}" class="user-icon" onclick='showUserProfile(${JSON.stringify(f)})'>
                    <div style="flex-grow:1" onclick='showUserProfile(${JSON.stringify(f)})'>${f.name}</div>
                    <button class="badge" style="background:var(--accent); border:none; color:#fff; cursor:pointer;" onclick="startDM('${f.id}')">TALK</button>
                `;
                list.appendChild(div);
            });
        }

        function showView(v) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            document.getElementById('nav-' + v).classList.add('active');
            if (window.innerWidth <= 768) toggleSidebar();
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function closeModal(m) { m.style.display = 'none'; }

        function promptAdmin() {
            const p = prompt("ENTER ADMIN PIN");
            if (p === '9999999999') {
                userData.isAdmin = true;
                saveData();
                alert("ADMIN MODE ENABLED");
                location.reload();
            }
        }
    </script>
</body>
</html>
