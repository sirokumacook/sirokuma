<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shirokuma Pro v5</title>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-discord: #36393f;
            --bg-side: #2f3136;
            --bg-black: #000000;
            --accent: #5865f2; /* Discord Blue */
            --gold: #d4af37;
            --verify-blue: #1d9bf0;
            --text-main: #dcddde;
            --text-sub: #8e9297;
            --danger: #ed4245;
            --online: #3ba55d;
            --offline: #747f8d;
        }

        body {
            font-family: 'Whitney', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0; background: var(--bg-black); color: var(--text-main);
            display: flex; height: 100dvh; overflow: hidden;
        }

        /* --- Layout --- */
        #sidebar {
            width: 240px; background: var(--bg-side);
            display: flex; flex-direction: column; flex-shrink: 0;
            transition: 0.3s; z-index: 100;
        }

        #main-content { flex-grow: 1; display: flex; flex-direction: column; background: var(--bg-discord); position: relative; }

        @media screen and (max-width: 768px) {
            #sidebar { position: absolute; left: -240px; height: 100%; }
            #sidebar.open { left: 0; }
            .mobile-back { display: block !important; }
        }

        /* --- Sidebar Parts --- */
        .brand { padding: 15px; font-weight: bold; font-size: 18px; border-bottom: 1px solid #222; }
        
        .my-profile-brief {
            padding: 10px 15px; display: flex; align-items: center; gap: 10px;
            background: rgba(0,0,0,0.2); cursor: pointer;
        }
        .my-profile-brief:hover { background: rgba(255,255,255,0.05); }
        .avatar { width: 32px; height: 32px; border-radius: 50%; background: #555; object-fit: cover; border: 2px solid transparent; }
        .avatar.online { border-color: var(--online); }
        .avatar.invisible { border-color: var(--offline); }

        .nav-item {
            padding: 10px 15px; cursor: pointer; display: flex; align-items: center; gap: 10px;
            color: var(--text-sub); font-size: 15px;
        }
        .nav-item:hover, .nav-item.active { background: #393c43; color: #fff; }

        /* --- Views --- */
        .view { display: none; flex-direction: column; height: 100%; }
        .view.active { display: flex; }
        header { height: 48px; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #26272b; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        
        .msg-area { flex-grow: 1; overflow-y: auto; padding: 20px 0; }
        .msg-row { padding: 5px 20px; position: relative; display: flex; gap: 15px; }
        .msg-row:hover { background: rgba(4,4,5,0.07); }
        .msg-content { flex-grow: 1; }
        .msg-name { font-weight: bold; font-size: 15px; cursor: pointer; }
        .msg-text { font-size: 14px; white-space: pre-wrap; word-break: break-all; }
        .msg-deleted { color: #555; font-style: italic; font-size: 12px; }
        .admin-peek { color: rgba(212, 175, 55, 0.3); font-size: 11px; margin-left: 5px; }

        .input-box-wrapper { padding: 0 20px 20px; }
        .input-field {
            background: #40444b; border-radius: 8px; padding: 10px 15px;
            display: flex; align-items: center; gap: 10px;
        }
        input[type="text"] { background: none; border: none; color: #fff; outline: none; flex-grow: 1; }

        /* --- Badges --- */
        .badge { width: 14px; height: 14px; vertical-align: middle; margin-left: 4px; }
        .badge-gold { fill: var(--gold); }
        .badge-blue { fill: var(--verify-blue); }

        /* --- Modals --- */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-box { background: var(--bg-discord); width: 90%; max-width: 440px; border-radius: 8px; overflow: hidden; }
        .modal-body { padding: 20px; }
        .btn { padding: 10px 20px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-ghost { background: none; color: white; border: 1px solid #4f545c; }

        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

    <svg style="display:none">
        <symbol id="icon-ver" viewBox="0 0 24 24"><path d="M22.25 12c0-1.43-.88-2.67-2.19-3.34.46-1.39.2-2.97-.81-4.01s-2.62-1.27-4.01-.81C14.67 2.53 13.43 1.65 12 1.65s-2.67.88-3.34 2.19c-1.39-.46-2.97-.2-4.01.81s-1.27 2.62-.81 4.01C2.53 9.33 1.65 10.57 1.65 12s.88 2.67 2.19 3.34c-.46 1.39-.2 2.97.81 4.01s2.62 1.27 4.01.81c.67 1.31 1.91 2.19 3.34 2.19s2.67-.88 3.34-2.19c1.39.46 2.97.2 4.01-.81s1.27-2.62.81-4.01c1.31-.67 2.19-1.91 2.19-3.34zm-11.71 4.2l-3.53-3.53 1.41-1.41 2.12 2.12 4.96-4.96 1.41 1.41-6.37 6.37z"/></symbol>
    </svg>

    <aside id="sidebar">
        <div class="brand">Shirokuma Pro</div>
        
        <div class="my-profile-brief" onclick="openMyProfile()">
            <img id="my-avatar-side" class="avatar" src="">
            <div style="flex-grow:1; overflow:hidden;">
                <div id="my-name-side" style="font-weight:bold; font-size:14px; overflow:hidden; text-overflow:ellipsis;">---</div>
                <div id="my-status-text" style="font-size:11px; color:var(--text-sub);">オンライン</div>
            </div>
            <div id="my-badge-side"></div>
        </div>

        <nav style="margin-top:10px; flex-grow:1">
            <div class="nav-item active" onclick="showView('global')"><span>#</span> グローバル</div>
            <div class="nav-item" onclick="showView('dm')"><span>@</span> 個人チャット</div>
            <div class="nav-item" onclick="showView('friends')"><span>👥</span> フレンド</div>
            <div class="nav-item" onclick="showView('settings')"><span>⚙️</span> 設定</div>
        </nav>

        <div style="padding:10px; font-size:10px; color:#444; border-top:1px solid #222;">ID: <span id="my-id-display"></span></div>
    </aside>

    <main id="main-content">
        <div id="view-global" class="view active">
            <header>
                <button class="btn-ghost mobile-back" style="display:none; margin-right:10px;" onclick="toggleSidebar()">≡</button>
                <div style="font-weight:bold;"># グローバル</div>
                <div id="global-count" style="margin-left:auto; font-size:12px; color:var(--text-sub);">0人が閲覧中</div>
            </header>
            <div id="msg-global" class="msg-area"></div>
            <div class="input-box-wrapper">
                <div class="input-field">
                    <input type="text" id="in-global" placeholder="#グローバルへメッセージを送信" onkeypress="if(event.key==='Enter')sendMsg('global')">
                </div>
            </div>
        </div>

        <div id="view-dm" class="view">
            <header>
                <button class="btn-ghost mobile-back" style="display:none; margin-right:10px;" onclick="toggleSidebar()">≡</button>
                <div id="dm-title" style="font-weight:bold;">個人チャット</div>
                <button id="dm-close-btn" class="btn-ghost" style="margin-left:auto; font-size:11px; display:none;" onclick="closeDM()">切断</button>
            </header>
            <div id="dm-init" style="padding:40px; text-align:center;">
                <p>相手のPINを入力して接続リクエストを送信</p>
                <input type="text" id="target-pin" style="background:#222; border:1px solid #444; padding:10px; text-align:center; font-size:20px; width:150px;" placeholder="00000">
                <button class="btn btn-primary" style="display:block; margin:20px auto;" onclick="requestConnect()">リクエスト送信</button>
                <p style="font-size:12px; color:var(--text-sub);">あなたのPIN: <strong id="my-pin-display">---</strong></p>
            </div>
            <div id="msg-dm" class="msg-area" style="display:none;"></div>
            <div id="dm-input-area" class="input-box-wrapper" style="display:none;">
                <div class="input-field">
                    <input type="text" id="in-dm" placeholder="メッセージを送信" onkeypress="if(event.key==='Enter')sendMsg('dm')">
                </div>
            </div>
        </div>

        <div id="view-friends" class="view">
            <header>
                <button class="btn-ghost mobile-back" style="display:none; margin-right:10px;" onclick="toggleSidebar()">＜ 戻る</button>
                <div style="font-weight:bold;">フレンド</div>
            </header>
            <div id="friend-list" style="padding:10px;"></div>
        </div>

        <div id="view-settings" class="view">
            <header>
                <button class="btn-ghost mobile-back" style="display:none; margin-right:10px;" onclick="toggleSidebar()">＜ 戻る</button>
                <div style="font-weight:bold;">ユーザー設定</div>
            </header>
            <div style="padding:20px; overflow-y:auto;">
                <h3>プロフィール設定</h3>
                <div class="btn-ghost" style="padding:15px; border-radius:8px; margin-bottom:20px;">
                    <label>表示名</label><br>
                    <input type="text" id="set-name" style="width:100%; padding:8px; margin:10px 0;" onchange="updateProfile('name', this.value)">
                    <label>自己紹介</label><br>
                    <textarea id="set-bio" style="width:100%; background:#222; color:#fff; border:1px solid #444; padding:8px; margin-top:10px;" onchange="updateProfile('bio', this.value)"></textarea>
                    <label>アイコンURL</label><br>
                    <input type="text" id="set-icon" style="width:100%; padding:8px; margin-top:10px;" placeholder="画像URL" onchange="updateProfile('icon', this.value)">
                </div>

                <h3>ステータス</h3>
                <button class="btn btn-ghost" onclick="toggleInvisible()">オンライン隠し: <span id="inv-status">OFF</span></button>

                <div id="admin-settings-section" style="display:none; margin-top:40px; border-top:2px solid var(--gold); padding-top:20px;">
                    <h3 style="color:var(--gold)">管理者用 高度な設定 (30項目)</h3>
                    <div id="admin-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        </div>
                </div>

                <button class="btn btn-ghost" style="margin-top:40px; opacity:0.3;" onclick="promptAdmin()">管理者ログイン</button>
            </div>
        </div>
    </main>

    <div id="profile-modal" class="modal" onclick="this.style.display='none'">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div style="height:60px; background:var(--accent);"></div>
            <div class="modal-body" style="position:relative; padding-top:50px;">
                <img id="modal-avatar" class="avatar" style="width:80px; height:80px; position:absolute; top:-40px; left:20px; border:6px solid var(--bg-discord);" src="">
                <h2 id="modal-name"></h2>
                <div id="modal-badges" style="margin-bottom:10px;"></div>
                <div id="modal-status-label" style="font-size:12px; margin-bottom:10px;"></div>
                <div id="modal-bio" style="background:#222; padding:10px; border-radius:4px; font-size:14px; margin-bottom:20px;"></div>
                
                <div id="modal-actions"></div>
            </div>
        </div>
    </div>

    <script>
        // --- データ管理 ---
        let me = JSON.parse(localStorage.getItem('sh5_me') || '{"name":"ゲスト","id":"","icon":"","bio":"","isAdmin":false,"isVerified":false,"isInvisible":false}');
        let friends = JSON.parse(localStorage.getItem('sh5_friends') || '[]');
        let verifiedUsers = JSON.parse(localStorage.getItem('sh5_vlist') || '[]'); // 管理者が認証したIDリスト

        if(!me.id) me.id = Math.floor(Math.random()*9e9+1e9).toString();
        localStorage.setItem('sh5_me', JSON.stringify(me));

        const goldBadge = `<svg class="badge badge-gold"><use href="#icon-ver"/></svg>`;
        const blueBadge = `<svg class="badge badge-blue"><use href="#icon-ver"/></svg>`;
        const sysIcon = "https://img.icons8.com/ios-filled/100/ffffff/settings.png";

        // --- PeerJS ---
        const peer = new Peer('SH5_' + me.id, { config: {'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }]} });
        const myPin = Math.floor(Math.random()*90000+10000).toString();
        const pinPeer = new Peer('SH5_PIN_' + myPin);
        
        let activeConn = null;
        let globalConns = [];

        window.onload = () => {
            initUI();
            connectGlobal();
            renderFriends();
            if(me.isAdmin) buildAdminSettings();
        };

        function initUI() {
            document.getElementById('my-id-display').textContent = me.id;
            document.getElementById('my-pin-display').textContent = myPin;
            document.getElementById('my-name-side').textContent = me.name;
            document.getElementById('my-avatar-side').src = me.icon || 'https://via.placeholder.com/32';
            document.getElementById('my-avatar-side').className = `avatar ${me.isInvisible?'invisible':'online'}`;
            document.getElementById('my-status-text').textContent = me.isInvisible ? '居留守中' : 'オンライン';
            document.getElementById('set-name').value = me.name;
            document.getElementById('set-bio').value = me.bio;
            document.getElementById('set-icon').value = me.icon;
            document.getElementById('inv-status').textContent = me.isInvisible ? 'ON' : 'OFF';
            if(me.isAdmin) document.getElementById('admin-settings-section').style.display = 'block';
            
            let badges = me.isAdmin ? goldBadge : (me.isVerified ? blueBadge : "");
            document.getElementById('my-badge-side').innerHTML = badges;
        }

        // --- 通信コア ---
        peer.on('connection', conn => handleIncoming(conn));
        pinPeer.on('connection', conn => handleIncoming(conn));

        function handleIncoming(conn) {
            if(conn.metadata?.isGlobal) { setupGlobal(conn); return; }
            
            const reqName = conn.metadata?.name || "誰か";
            if(confirm(`${reqName}（@${conn.metadata?.id}）から接続リクエストが届きました。承認しますか？`)) {
                setupDM(conn);
            } else {
                conn.send({type:'req_denied'});
                conn.close();
            }
        }

        function requestConnect() {
            const pin = document.getElementById('target-pin').value;
            const conn = peer.connect('SH5_PIN_'+pin, { metadata: { id: me.id, name: me.name, isRequest: true } });
            conn.on('open', () => {
                alert("リクエストを送信しました。相手が承認するまでお待ちください。");
            });
            conn.on('data', data => {
                if(data.type === 'req_denied') alert("リクエストが拒否されました。");
            });
            setupDM(conn);
        }

        function setupDM(conn) {
            activeConn = conn;
            conn.on('open', () => {
                showView('dm');
                document.getElementById('dm-init').style.display = 'none';
                document.getElementById('msg-dm').style.display = 'block';
                document.getElementById('dm-input-area').style.display = 'block';
                document.getElementById('dm-close-btn').style.display = 'block';
                addMsg('dm', {name:'システム', icon:sysIcon, content:'接続が確立されました', system:true, isAdmin:true});
                
                // 初回同期
                conn.send({type:'sync', me: me});
                if(me.isAdmin) conn.send({type:'v_list', list: verifiedUsers});
            });

            conn.on('data', data => {
                if(data.type === 'msg') addMsg('dm', data);
                if(data.type === 'del') deleteMsgLocal('dm', data.msgId, data.originalText);
                if(data.type === 'sync') {
                    activeConn.peerData = data.me;
                    updateFriendData(data.me);
                }
                if(data.type === 'v_list' && !me.isAdmin) {
                    const wasVerified = me.isVerified;
                    me.isVerified = data.list.includes(me.id);
                    if(!wasVerified && me.isVerified) alert("アカウントが認証されました！");
                    localStorage.setItem('sh5_me', JSON.stringify(me));
                    initUI();
                }
                if(data.type === 'req_auth') {
                    if(confirm(`${data.name}から認証リクエストが届きました。認証しますか？`)) {
                        verifiedUsers.push(data.id);
                        localStorage.setItem('sh5_vlist', JSON.stringify(verifiedUsers));
                        activeConn.send({type:'v_list', list: verifiedUsers});
                    }
                }
            });

            conn.on('close', () => {
                addMsg('dm', {name:'システム', icon:sysIcon, content:'切断されました', system:true, isAdmin:true});
                setTimeout(closeDM, 2000);
            });
        }

        function closeDM() {
            if(activeConn) activeConn.close();
            activeConn = null;
            document.getElementById('dm-init').style.display = 'block';
            document.getElementById('msg-dm').style.display = 'none';
            document.getElementById('dm-input-area').style.display = 'none';
            document.getElementById('dm-close-btn').style.display = 'none';
            document.getElementById('msg-dm').innerHTML = "";
            showView('dm');
        }

        // --- メッセージ操作 ---
        function sendMsg(target) {
            const input = document.getElementById('in-'+target);
            if(!input.value.trim()) return;
            const msgId = Date.now();
            const data = {
                type: 'msg', msgId, content: input.value,
                name: me.name, id: me.id, icon: me.icon,
                isAdmin: me.isAdmin, isVerified: me.isVerified,
                time: new Date().toLocaleTimeString()
            };

            if(target === 'global') {
                globalConns.forEach(c => c.send(data));
            } else if(activeConn) {
                activeConn.send(data);
            }
            addMsg(target, data);
            input.value = "";
        }

        function addMsg(target, d) {
            const area = document.getElementById('msg-'+target);
            const div = document.createElement('div');
            div.className = 'msg-row';
            div.id = `msg-${d.msgId}`;
            
            const badge = d.isAdmin ? goldBadge : (d.isVerified ? blueBadge : "");
            const nameColor = d.isAdmin ? 'color:var(--gold)' : 'color:#fff';

            div.innerHTML = `
                <img src="${d.icon || 'https://via.placeholder.com/40'}" class="avatar" style="width:40px; height:40px;" onclick="viewProfileById('${d.id}', '${d.name}', '${d.icon}', '${d.isAdmin}', '${d.isVerified}')">
                <div class="msg-content">
                    <div class="msg-header">
                        <span class="msg-name" style="${nameColor}" onclick="viewProfileById('${d.id}', '${d.name}', '${d.icon}', '${d.isAdmin}', '${d.isVerified}')">${d.name}</span>
                        ${badge}
                        <span style="font-size:11px; color:var(--text-sub); margin-left:8px;">${d.time || ''}</span>
                    </div>
                    <div class="msg-text" id="text-${d.msgId}">${d.content}</div>
                </div>
                ${(d.id === me.id || me.isAdmin) && !d.system ? `<button onclick="requestDelete('${target}', ${d.msgId})" style="background:none; border:none; color:var(--text-sub); cursor:pointer; font-size:10px;">削除</button>` : ''}
            `;
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;
        }

        function requestDelete(target, msgId) {
            let notify = true;
            if(me.isAdmin) notify = confirm("削除したことを通知しますか？（キャンセルでサイレント削除）");
            const originalText = document.getElementById(`text-${msgId}`).textContent;
            
            const data = { type: 'del', msgId, notify, originalText };
            if(target === 'global') globalConns.forEach(c => c.send(data));
            else if(activeConn) activeConn.send(data);
            
            deleteMsgLocal(target, msgId, originalText);
        }

        function deleteMsgLocal(target, msgId, originalText) {
            const textEl = document.getElementById(`text-${msgId}`);
            if(!textEl) return;
            
            if(me.isAdmin) {
                textEl.innerHTML = `<span class="msg-deleted">削除されました</span> <span class="admin-peek">(内容: ${originalText})</span>`;
            } else {
                textEl.innerHTML = `<span class="msg-deleted">メッセージは削除されました</span>`;
            }
        }

        // --- プロフィール & フレンド ---
        function viewProfileById(id, name, icon, isAdmin, isVerified) {
            const modal = document.getElementById('profile-modal');
            document.getElementById('modal-avatar').src = icon || 'https://via.placeholder.com/80';
            document.getElementById('modal-name').textContent = name;
            document.getElementById('modal-bio').textContent = (id === me.id ? me.bio : "通信相手のプロフィールです。");
            
            let badges = (isAdmin === 'true' || isAdmin === true) ? goldBadge : ((isVerified === 'true' || isVerified === true) ? blueBadge : "");
            document.getElementById('modal-badges').innerHTML = badges;

            // ステータス表示
            let statusHTML = `<span class="status-dot" style="background:var(--online)"></span> オンライン`;
            if(me.isAdmin && id !== me.id) {
                // 管理者なら相手の本当の状態を推測（PeerJSの接続状態など）
                statusHTML += ` <span style="color:var(--gold); font-size:10px;">(正確な状態を監視中)</span>`;
            }
            document.getElementById('modal-status-label').innerHTML = statusHTML;

            // アクションボタン
            const actions = document.getElementById('modal-actions');
            actions.innerHTML = "";
            if(id !== me.id) {
                if(!friends.find(f => f.id === id)) {
                    const btn = document.createElement('button');
                    btn.className = "btn btn-primary";
                    btn.textContent = "フレンドに追加";
                    btn.onclick = () => addFriend(id, name, icon, isAdmin, isVerified);
                    actions.appendChild(btn);
                } else {
                    const btn = document.createElement('button');
                    btn.className = "btn btn-ghost";
                    btn.style.borderColor = "var(--danger)";
                    btn.textContent = "フレンド削除";
                    btn.onclick = () => removeFriend(id);
                    actions.appendChild(btn);
                }

                // 認証リクエスト（自分が未認証、相手が管理者の場合のみ）
                if(!me.isVerified && !me.isAdmin && (isAdmin === 'true' || isAdmin === true)) {
                    const authBtn = document.createElement('button');
                    authBtn.className = "btn btn-ghost";
                    authBtn.style.marginLeft = "10px";
                    authBtn.textContent = "認証をリクエスト";
                    authBtn.onclick = () => {
                        if(activeConn) {
                            activeConn.send({type:'req_auth', id:me.id, name:me.name});
                            alert("リクエストを送りました");
                        } else { alert("相手と接続中のみリクエスト可能です"); }
                    };
                    actions.appendChild(authBtn);
                }
            }
            
            modal.style.display = 'flex';
        }

        function addFriend(id, name, icon, isAdmin, isVerified) {
            if(!friends.find(f => f.id === id)) {
                friends.push({id, name, icon, isAdmin, isVerified, online: true});
                localStorage.setItem('sh5_friends', JSON.stringify(friends));
                renderFriends();
                alert("フレンドに追加しました");
            }
        }

        function removeFriend(id) {
            friends = friends.filter(f => f.id !== id);
            localStorage.setItem('sh5_friends', JSON.stringify(friends));
            renderFriends();
            document.getElementById('profile-modal').style.display = 'none';
        }

        function renderFriends() {
            const list = document.getElementById('friend-list');
            list.innerHTML = "";
            friends.forEach(f => {
                const div = document.createElement('div');
                div.className = "nav-item";
                div.style.justifyContent = "space-between";
                const badge = f.isAdmin ? goldBadge : (f.isVerified ? blueBadge : "");
                div.innerHTML = `
                    <div style="display:flex; align-items:center; gap:10px;">
                        <img src="${f.icon || ''}" class="avatar ${f.online?'online':'offline'}" style="width:30px; height:30px;">
                        <span style="font-weight:bold;">${f.name}</span>${badge}
                    </div>
                    <button class="btn-ghost" style="padding:2px 8px; font-size:10px;" onclick="viewProfileById('${f.id}','${f.name}','${f.icon}',${f.isAdmin},${f.isVerified})">詳細</button>
                `;
                list.appendChild(div);
            });
        }

        // --- 設定 ---
        function updateProfile(key, val) {
            me[key] = val;
            localStorage.setItem('sh5_me', JSON.stringify(me));
            initUI();
            if(activeConn) activeConn.send({type:'sync', me:me});
        }

        function toggleInvisible() {
            me.isInvisible = !me.isInvisible;
            localStorage.setItem('sh5_me', JSON.stringify(me));
            initUI();
            if(activeConn) activeConn.send({type:'sync', me:me});
        }

        function promptAdmin() {
            if(prompt("管理者キーを入力") === '9999999999') {
                me.isAdmin = true;
                localStorage.setItem('sh5_me', JSON.stringify(me));
                location.reload();
            }
        }

        function buildAdminSettings() {
            const grid = document.getElementById('admin-grid');
            for(let i=1; i<=30; i++) {
                const btn = document.createElement('button');
                btn.className = "btn btn-ghost";
                btn.style.fontSize = "10px";
                btn.textContent = `管理項目 #${i}`;
                btn.onclick = () => alert(`設定項目 ${i} が有効になりました (模擬動作)`);
                grid.appendChild(btn);
            }
        }

        // --- その他 ---
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function showView(v) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.getElementById('view-'+v).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            if(window.innerWidth <= 768) toggleSidebar();
        }

        function connectGlobal() {
            const relayId = 'SH5_GLOBAL_V1';
            const conn = peer.connect(relayId, { metadata: { isGlobal: true, name: me.name } });
            setupGlobal(conn);
            const relay = new Peer(relayId);
            relay.on('connection', c => setupGlobal(c));
        }

        function setupGlobal(conn) {
            if(!globalConns.find(c => c.peer === conn.peer)) {
                globalConns.push(conn);
                conn.on('data', data => {
                    if(data.type === 'msg') addMsg('global', data);
                    if(data.type === 'del') deleteMsgLocal('global', data.msgId, data.originalText);
                });
                document.getElementById('global-count').textContent = `${globalConns.length + 1}人が閲覧中`;
            }
        }
    </script>
</body>
</html>
