<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shirokuma</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #36393f;
            color: #dcddde;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #name-modal {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #36393f;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .modal-content h2 { margin-top: 0; color: #fff; }
        .modal-content input {
            width: 80%; padding: 10px; margin: 15px 0;
            border: none; border-radius: 5px;
            background: #202225; color: #dcddde;
            font-size: 16px;
        }
        .btn {
            background: #5865F2; color: white;
            border: none; padding: 10px 20px;
            border-radius: 5px; cursor: pointer;
            font-weight: bold; font-size: 14px;
        }
        .btn:hover { background: #4752C4; }

        #sidebar {
            width: 250px;
            background-color: #2f3136;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #202225;
            font-weight: bold;
            color: #fff;
        }
        .tab-btn {
            padding: 15px 20px; cursor: pointer;
            background: none; border: none; color: #8e9297;
            text-align: left; font-size: 16px; font-weight: bold;
        }
        .tab-btn:hover { background-color: #393c43; color: #dcddde; }
        .tab-btn.active { background-color: #393c43; color: #fff; }
        .tab-content { display: none; padding: 20px; flex-grow: 1; overflow-y: auto; }
        .tab-content.active { display: block; }

        .input-group { margin-bottom: 15px; }
        .input-group input {
            width: calc(100% - 20px); padding: 10px;
            border: none; border-radius: 5px;
            background: #202225; color: #dcddde;
        }
        .input-group button { width: 100%; margin-top: 10px; }

        #main-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background-color: #36393f;
            position: relative;
        }
        #chat-header {
            padding: 20px;
            border-bottom: 1px solid #202225;
            font-weight: bold; color: #fff;
            display: flex; justify-content: space-between;
        }
        #chat-content {
            flex-grow: 1; padding: 20px; overflow-y: auto;
            display: none; flex-direction: column;
        }
        .message { margin-bottom: 20px; display: flex; flex-direction: column; }
        .message-header { display: flex; align-items: baseline; margin-bottom: 5px; }
        .message-sender { font-weight: bold; color: #fff; margin-right: 10px; }
        .message-id { font-size: 12px; color: #72767d; }
        .message-body { color: #dcddde; line-height: 1.4; }
        .message img { max-width: 300px; border-radius: 5px; margin-top: 10px; }

        #chat-input-area {
            padding: 20px;
            background-color: #36393f;
            display: none;
        }
        .chat-input-wrapper {
            background-color: #40444b;
            border-radius: 8px;
            display: flex; align-items: center; padding: 10px;
        }
        #chat-text {
            flex-grow: 1; border: none; background: transparent;
            color: #dcddde; outline: none; font-size: 15px;
        }
        .icon-btn {
            background: none; border: none; color: #b9bbbe;
            cursor: pointer; font-size: 20px; padding: 0 10px;
        }
        .icon-btn:hover { color: #fff; }

        .friend-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px; border-radius: 5px; margin-bottom: 5px;
            background: #202225;
        }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; background: #747f8d; margin-right: 8px; }
        .status-dot.online { background: #3ba55c; }
    </style>
</head>
<body>

    <div id="name-modal" style="display: none;">
        <div class="modal-content">
            <h2>プロフィール設定</h2>
            <p>Shirokumaで使用する名前を決めてください</p>
            <input type="text" id="initial-name" placeholder="例: りゅうた" maxlength="20">
            <button class="btn" onclick="saveName()">決定</button>
        </div>
    </div>

    <div id="sidebar">
        <div class="sidebar-header">
            <div>Shirokuma</div>
            <div style="font-size: 12px; font-weight: normal; margin-top: 5px; color: #b9bbbe;">
                <span id="my-name-display"></span>#<span id="my-id-display"></span>
            </div>
            <div style="font-size: 12px; font-weight: normal; margin-top: 5px; color: #b9bbbe;">
                PIN: <strong id="my-pin-display"></strong>
            </div>
        </div>
        
        <button class="tab-btn active" onclick="switchTab('pin-tab')">PIN接続</button>
        <button class="tab-btn" onclick="switchTab('friend-tab')">フレンド</button>

        <div id="pin-tab" class="tab-content active">
            <div class="input-group">
                <input type="text" id="target-pin" placeholder="相手の5桁PIN" maxlength="5">
                <button class="btn" onclick="connectViaPin()">接続要求</button>
            </div>
        </div>

        <div id="friend-tab" class="tab-content">
            <button class="btn" style="width:100%; margin-bottom: 15px;" onclick="checkFriendsStatus()">状態更新</button>
            <div id="friend-list"></div>
        </div>
    </div>

    <div id="main-area">
        <div id="chat-header">
            <span id="chat-title">チャット相手を待っています...</span>
            <div id="chat-actions" style="display: none;">
                <button class="btn" style="padding: 5px 10px; margin-right: 10px;" onclick="sendFriendRequest()">フレンド追加</button>
                <button class="btn" style="background: #ed4245; padding: 5px 10px;" onclick="disconnectChat()">切断</button>
            </div>
        </div>
        
        <div id="chat-content">
            <div id="messages"></div>
        </div>

        <div id="chat-input-area">
            <div class="chat-input-wrapper">
                <input type="file" id="chat-image" accept="image/*" style="display: none;" onchange="sendImage()">
                <button class="icon-btn" onclick="document.getElementById('chat-image').click()">📷</button>
                <input type="text" id="chat-text" placeholder="メッセージを送信" onkeypress="handleEnter(event)">
                <button class="icon-btn" onclick="sendText()">➤</button>
            </div>
        </div>
    </div>

    <script>
        let myId = localStorage.getItem('shirokuma_id');
        if (!myId) {
            myId = Math.floor(1000000000 + Math.random() * 9000000000).toString();
            localStorage.setItem('shirokuma_id', myId);
        }
        document.getElementById('my-id-display').textContent = myId;

        let myPin = Math.floor(10000 + Math.random() * 90000).toString();
        document.getElementById('my-pin-display').textContent = myPin;

        let myName = localStorage.getItem('shirokuma_name');
        if (!myName) {
            document.getElementById('name-modal').style.display = 'flex';
        } else {
            document.getElementById('my-name-display').textContent = myName;
        }

        function saveName() {
            const nameInput = document.getElementById('initial-name').value.trim();
            if (nameInput === '') {
                alert('名前を入力してください');
                return;
            }
            myName = nameInput;
            localStorage.setItem('shirokuma_name', myName);
            document.getElementById('my-name-display').textContent = myName;
            document.getElementById('name-modal').style.display = 'none';
        }

        let friends = JSON.parse(localStorage.getItem('shirokuma_friends') || '[]');
        let activeConnection = null;

        const peerId = new Peer('Shirokuma_ID_' + myId);
        const peerPin = new Peer('Shirokuma_PIN_' + myPin);

        peerId.on('connection', handleIncomingConnection);
        peerPin.on('connection', handleIncomingConnection);

        function handleIncomingConnection(conn) {
            if (conn.metadata && conn.metadata.type === 'ping') {
                conn.on('open', () => {
                    conn.send({ type: 'pong' });
                    setTimeout(() => conn.close(), 500);
                });
                return;
            }

            if (confirm('接続要求がありました。受け入れますか？')) {
                setupConnection(conn);
            } else {
                conn.close();
            }
        }

        function connectViaPin() {
            const pin = document.getElementById('target-pin').value;
            if (pin.length !== 5) {
                alert('5桁のPINを入力してください');
                return;
            }
            const conn = peerPin.connect('Shirokuma_PIN_' + pin, { metadata: { type: 'chat' } });
            setupConnection(conn);
        }

        function connectToFriend(friendId) {
            const conn = peerId.connect('Shirokuma_ID_' + friendId, { metadata: { type: 'chat' } });
            setupConnection(conn);
        }

        function setupConnection(conn) {
            activeConnection = conn;
            conn.on('open', () => {
                document.getElementById('chat-content').style.display = 'flex';
                document.getElementById('chat-input-area').style.display = 'block';
                document.getElementById('chat-actions').style.display = 'block';
                
                const remoteId = conn.peer.replace('Shirokuma_ID_', '').replace('Shirokuma_PIN_', '');
                document.getElementById('chat-title').textContent = '接続先ID: ' + remoteId;
                
                document.getElementById('messages').innerHTML = '';
                addMessage('システム', '', '接続が完了しました');
            });

            conn.on('data', (data) => {
                const senderName = data.senderName || '名無し';
                if (data.type === 'text') {
                    addMessage(senderName, data.senderId, autoLink(data.content));
                } else if (data.type === 'image') {
                    addMessage(senderName, data.senderId, `<img src="${data.content}">`);
                } else if (data.type === 'friend_request') {
                    if (confirm(`【${senderName}】（ID: ${data.id}）からフレンド申請が届きました。承認しますか？`)) {
                        addFriend(data.id, senderName);
                        alert('フレンドに追加しました');
                    }
                }
            });

            conn.on('close', () => {
                addMessage('システム', '', '切断されました');
                document.getElementById('chat-actions').style.display = 'none';
                document.getElementById('chat-input-area').style.display = 'none';
                activeConnection = null;
            });
        }

        function handleEnter(e) {
            if (e.key === 'Enter') sendText();
        }

        function sendText() {
            if (!activeConnection) return;
            const input = document.getElementById('chat-text');
            const text = input.value;
            if (text.trim() === '') return;

            activeConnection.send({ type: 'text', content: text, senderName: myName, senderId: myId });
            addMessage(myName, myId, autoLink(text));
            input.value = '';
        }

        function sendImage() {
            if (!activeConnection) return;
            const fileInput = document.getElementById('chat-image');
            const file = fileInput.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const base64Img = e.target.result;
                activeConnection.send({ type: 'image', content: base64Img, senderName: myName, senderId: myId });
                addMessage(myName, myId, `<img src="${base64Img}">`);
                fileInput.value = '';
            };
            reader.readAsDataURL(file);
        }

        function sendFriendRequest() {
            if (!activeConnection) return;
            activeConnection.send({ type: 'friend_request', id: myId, senderName: myName });
            alert('フレンド申請を送信しました');
        }

        function addFriend(id, name) {
            const existing = friends.find(f => f.id === id);
            if (!existing) {
                friends.push({ id: id, name: name });
                localStorage.setItem('shirokuma_friends', JSON.stringify(friends));
                renderFriends();
            }
        }

        function addMessage(senderName, senderId, content) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            
            let idHtml = senderId ? `<span class="message-id">#${senderId}</span>` : '';
            
            msgDiv.innerHTML = `
                <div class="message-header">
                    <span class="message-sender">${senderName}</span>
                    ${idHtml}
                </div>
                <div class="message-body">${content}</div>
            `;
            const messagesContainer = document.getElementById('messages');
            messagesContainer.appendChild(msgDiv);
            messagesContainer.parentElement.scrollTop = messagesContainer.parentElement.scrollHeight;
        }

        function autoLink(text) {
            const regex = /(https?:\/\/[^\s]+)/g;
            return text.replace(regex, '<a href="$1" target="_blank" style="color: #00b0f4;">$1</a>');
        }

        function disconnectChat() {
            if (activeConnection) {
                activeConnection.close();
                document.getElementById('chat-title').textContent = 'チャット相手を待っています...';
                document.getElementById('chat-actions').style.display = 'none';
                document.getElementById('chat-input-area').style.display = 'none';
            }
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
            
            if(tabId === 'friend-tab') {
                renderFriends();
                checkFriendsStatus();
            }
        }

        function renderFriends() {
            const list = document.getElementById('friend-list');
            list.innerHTML = '';
            friends.forEach(friend => {
                const fId = friend.id || friend; 
                const fName = friend.name || '名無し';
                
                const item = document.createElement('div');
                item.className = 'friend-item';
                item.innerHTML = `
                    <div style="color: #dcddde; display: flex; align-items: center;">
                        <span class="status-dot" id="status-${fId}"></span> 
                        <div>
                            <div style="font-weight: bold;">${fName}</div>
                            <div style="font-size: 11px; color: #72767d;">#${fId}</div>
                        </div>
                    </div>
                    <button class="btn" style="padding: 5px 10px;" onclick="connectToFriend('${fId}')">接続</button>
                `;
                list.appendChild(item);
            });
        }

        function checkFriendsStatus() {
            friends.forEach(friend => {
                const fId = friend.id || friend;
                const dot = document.getElementById(`status-${fId}`);
                if(dot) dot.classList.remove('online');

                const pingConn = peerId.connect('Shirokuma_ID_' + fId, { metadata: { type: 'ping' } });
                pingConn.on('open', () => {
                    if(dot) dot.classList.add('online');
                });
                pingConn.on('data', (data) => {
                    if(data.type === 'pong') pingConn.close();
                });
                pingConn.on('error', () => {
                    if(dot) dot.classList.remove('online');
                });
            });
        }
    </script>
</body>
</html>
