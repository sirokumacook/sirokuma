<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shirokuma</title>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root {
            --main-color: #5865F2; /* デフォルトの紫 */
            --bg-dark: #36393f;
            --sidebar-bg: #2f3136;
            --input-bg: #202225;
            --text-normal: #dcddde;
            --text-muted: #72767d;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-normal);
            display: flex; height: 100vh; overflow: hidden;
        }

        /* 初期設定モーダル */
        #name-modal, #admin-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex; justify-content: center; align-items: center; z-index: 2000;
        }

        .modal-content {
            background: var(--bg-dark); padding: 30px; border-radius: 8px;
            text-align: center; width: 80%; max-width: 400px;
        }

        /* レイアウト構成 */
        #sidebar {
            width: 260px; background-color: var(--sidebar-bg);
            display: flex; flex-direction: column; transition: 0.3s;
        }

        #main-area {
            flex-grow: 1; display: flex; flex-direction: column;
            background-color: var(--bg-dark); position: relative;
        }

        /* スマホ対応：レスポンシブ設定 */
        @media screen and (max-width: 768px) {
            #sidebar {
                position: absolute; left: -100%; width: 100%; height: 100%; z-index: 100;
            }
            #sidebar.open { left: 0; }
            #main-area { width: 100%; }
        }

        /* サイドバー下部（ID表示） */
        .sidebar-footer {
            padding: 10px; font-size: 10px; color: var(--text-muted);
            border-top: 1px solid #202225; text-align: center;
        }

        /* チャットスタイル */
        .message { margin-bottom: 15px; padding: 5px 20px; }
        .admin-badge {
            background: gold; color: black; border-radius: 3px;
            font-size: 10px; padding: 1px 4px; margin-left: 5px; font-weight: bold;
        }

        /* 設定項目 */
        .settings-row { margin: 15px 0; text-align: left; }
        input[type="text"], input[type="password"], input[type="color"] {
            width: 100%; padding: 10px; border-radius: 5px; border: none;
            background: var(--input-bg); color: white; box-sizing: border-box;
        }

        .tab-btn {
            width: 100%; padding: 15px; background: none; border: none;
            color: var(--text-muted); text-align: left; cursor: pointer; font-size: 16px;
        }
        .tab-btn.active { background: #393c43; color: white; border-left: 4px solid var(--main-color); }

        .btn {
            background: var(--main-color); color: white; border: none;
            padding: 10px; border-radius: 5px; cursor: pointer; width: 100%;
        }

        .friend-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px; background: var(--input-bg); margin-bottom: 5px; border-radius: 5px;
        }
        .status-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; background: gray; margin-right: 5px; }
        .status-dot.online { background: #3ba55c; box-shadow: 0 0 5px #3ba55c; }
    </style>
</head>
<body>

    <div id="name-modal" style="display: none;">
        <div class="modal-content">
            <h2>Shirokuma</h2>
            <p>名前を入力してください</p>
            <input type="text" id="initial-name" placeholder="例: 大谷翔平">
            <button class="btn" style="margin-top: 15px;" onclick="saveName()">開始する</button>
        </div>
    </div>

    <div id="admin-modal" style="display: none;">
        <div class="modal-content">
            <h3>管理者認証</h3>
            <input type="password" id="admin-pass-input" placeholder="パスコードを入力">
            <button class="btn" style="margin-top: 15px;" onclick="checkAdminPass()">認証</button>
            <button class="btn" style="background:none;" onclick="toggleModal('admin-modal', false)">キャンセル</button>
        </div>
    </div>

    <div id="sidebar">
        <div style="padding: 20px; font-weight: bold; font-size: 20px;">Shirokuma</div>
        
        <button class="tab-btn active" onclick="switchTab('pin-tab')">PIN接続</button>
        <button class="tab-btn" onclick="switchTab('friend-tab')">フレンド</button>
        <button class="tab-btn" onclick="switchTab('settings-tab')">設定</button>

        <div id="pin-tab" class="tab-content" style="display: block; padding: 15px;">
            <input type="text" id="target-pin" placeholder="5桁のPIN" maxlength="5">
            <button class="btn" style="margin-top: 10px;" onclick="connectViaPin()">接続要求</button>
            <div style="margin-top: 20px; font-size: 12px;">あなたのPIN: <strong id="my-pin-display"></strong></div>
        </div>

        <div id="friend-tab" class="tab-content" style="display: none; padding: 15px;">
            <div id="friend-list"></div>
        </div>

        <div id="settings-tab" class="tab-content" style="display: none; padding: 15px;">
            <div class="settings-row">
                <label>名前の変更</label>
                <input type="text" id="change-name-input" onchange="updateName(this.value)">
            </div>
            <div class="settings-row">
                <label>テーマカラー</label>
                <input type="color" id="color-picker" onchange="updateMainColor(this.value)">
            </div>
            <hr style="border: 0.5px solid #444;">
            <button class="btn" style="background: #444;" onclick="toggleModal('admin-modal', true)">管理者モードを有効にする</button>
        </div>

        <div style="flex-grow: 1;"></div>
        <div class="sidebar-footer">ID: <span id="my-id-display"></span></div>
    </div>

    <div id="main-area">
        <div id="chat-header" style="padding: 15px; background: var(--sidebar-bg); display: flex; justify-content: space-between; align-items: center;">
            <button class="btn" style="width: auto; padding: 5px 10px;" id="menu-toggle" onclick="toggleSidebar()">≡</button>
            <span id="chat-title" style="font-weight: bold;">接続待ち</span>
            <div id="chat-actions" style="display: none;">
                <button class="btn" id="add-friend-btn" style="width: auto; padding: 5px 10px; margin-right: 5px;" onclick="sendFriendRequest()">フレンド追加</button>
                <button class="btn" style="width: auto; padding: 5px 10px; background: #ed4245;" onclick="location.reload()">切断</button>
            </div>
        </div>

        <div id="messages" style="flex-grow: 1; overflow-y: auto; padding: 10px 0;"></div>

        <div id="chat-input-area" style="padding: 20px; display: none;">
            <div style="background: #40444b; border-radius: 8px; display: flex; padding: 10px;">
                <input type="file" id="chat-image" style="display: none;" onchange="sendImage()">
                <button onclick="document.getElementById('chat-image').click()" style="background: none; border: none; cursor: pointer; font-size: 20px;">📷</button>
                <input type="text" id="chat-text" style="flex-grow: 1; background: none; border: none; color: white; outline: none; margin: 0 10px;" placeholder="メッセージを送信" onkeypress="if(event.key==='Enter')sendText()">
                <button onclick="sendText()" style="background: none; border: none; color: var(--main-color); cursor: pointer; font-weight: bold;">送信</button>
            </div>
        </div>
    </div>

    <script>
        // 設定値の読み込み
        let myId = localStorage.getItem('s_id') || Math.floor(Math.random() * 9e9 + 1e9).toString();
        localStorage.setItem('s_id', myId);
        
        let myName = localStorage.getItem('s_name') || "";
        let friends = JSON.parse(localStorage.getItem('s_friends') || '[]');
        let isAdmin = localStorage.getItem('s_admin') === 'true';
        let adminColor = localStorage.getItem('s_admin_color') || '#ffffff';
        let themeColor = localStorage.getItem('s_theme') || '#5865F2';

        // 初期表示設定
        document.getElementById('my-id-display').textContent = myId;
        document.getElementById('change-name-input').value = myName;
        updateMainColor(themeColor);
        if (!myName) toggleModal('name-modal', true);

        // Peer設定（学校のフィルターを抜けやすくするため、ポート443のセキュア接続を使用）
        const peer = new Peer('SKR_' + myId, {
            config: {'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }]}
        });
        
        let myPin = Math.floor(Math.random() * 90000 + 10000).toString();
        const peerPin = new Peer('SKR_PIN_' + myPin);
        document.getElementById('my-pin-display').textContent = myPin;

        let activeConn = null;

        // 通信イベント
        peer.on('connection', c => handleConn(c));
        peerPin.on('connection', c => handleConn(c));

        function handleConn(conn) {
            if (conn.metadata?.type === 'ping') {
                conn.on('open', () => { conn.send({type:'pong', name: myName}); setTimeout(() => conn.close(), 1000); });
                return;
            }
            if (confirm('接続要求を許可しますか？')) setupChat(conn);
        }

        function setupChat(conn) {
            activeConn = conn;
            conn.on('open', () => {
                document.getElementById('chat-input-area').style.display = 'block';
                document.getElementById('chat-actions').style.display = 'block';
                document.getElementById('chat-title').textContent = "接続中";
                
                // 既にフレンドなら追加ボタンを隠す
                const isFriend = friends.some(f => f.id === conn.peer.replace('SKR_',''));
                document.getElementById('add-friend-btn').style.display = isFriend ? 'none' : 'inline-block';
            });

            conn.on('data', data => {
                if (data.type === 'msg') addMsg(data);
                if (data.type === 'friend_req') {
                    if (confirm(data.name + "からフレンド申請が届きました。承認しますか？")) {
                        addFriend(data.id, data.name);
                        // 承認したことを相手に伝えて、相手側もフレンド登録させる
                        activeConn.send({type: 'friend_confirm', id: myId, name: myName});
                    }
                }
                if (data.type === 'friend_confirm') {
                    addFriend(data.id, data.name);
                    alert(data.name + "とフレンドになりました！");
                }
                if (data.type === 'name_update') {
                    const f = friends.find(x => x.id === data.id);
                    if (f) { f.name = data.newName; saveFriends(); renderFriends(); }
                }
            });
        }

        // 基本機能
        function saveName() {
            const n = document.getElementById('initial-name').value || "大谷翔平";
            myName = n;
            localStorage.setItem('s_name', n);
            toggleModal('name-modal', false);
            document.getElementById('change-name-input').value = n;
        }

        function updateName(val) {
            myName = val;
            localStorage.setItem('s_name', val);
            if (activeConn) activeConn.send({type: 'name_update', id: myId, newName: val});
        }

        function updateMainColor(color) {
            themeColor = color;
            localStorage.setItem('s_theme', color);
            document.documentElement.style.setProperty('--main-color', color);
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).style.display = 'block';
            event.target.classList.add('active');
            if (window.innerWidth <= 768) toggleSidebar();
        }

        function connectViaPin() {
            const pin = document.getElementById('target-pin').value;
            setupChat(peerPin.connect('SKR_PIN_' + pin));
        }

        function sendText() {
            const txt = document.getElementById('chat-text').value;
            if (!txt || !activeConn) return;
            const data = { type:'msg', content: txt, name: myName, id: myId, admin: isAdmin, color: adminColor };
            activeConn.send(data);
            addMsg(data);
            document.getElementById('chat-text').value = '';
        }

        function addMsg(d) {
            const div = document.createElement('div');
            div.className = 'message';
            const nameColor = d.admin ? (d.color || 'gold') : 'white';
            div.innerHTML = `
                <div style="font-size:12px; font-weight:bold; color:${nameColor}">
                    ${d.name}${d.admin ? '<span class="admin-badge">ADMIN</span>' : ''}
                </div>
                <div style="word-break: break-all;">${d.content.match(/^https?:\/\//) ? `<a href="${d.content}" target="_blank" style="color:#00b0f4">${d.content}</a>` : d.content}</div>
            `;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        // フレンド機能
        function addFriend(id, name) {
            if (!friends.some(f => f.id === id)) {
                friends.push({id, name});
                saveFriends();
                renderFriends();
            }
        }

        function saveFriends() { localStorage.setItem('s_friends', JSON.stringify(friends)); }

        function renderFriends() {
            const list = document.getElementById('friend-list');
            list.innerHTML = '';
            friends.forEach(f => {
                list.innerHTML += `
                    <div class="friend-item">
                        <span><span class="status-dot" id="dot-${f.id}"></span>${f.name}</span>
                        <button class="btn" style="width:auto; padding:2px 10px;" onclick="connectToFriend('${f.id}')">接続</button>
                    </div>
                `;
            });
        }

        function connectToFriend(fid) {
            setupChat(peer.connect('SKR_' + fid));
        }

        function sendFriendRequest() {
            if (activeConn) {
                activeConn.send({type:'friend_req', id: myId, name: myName});
                alert("申請を送りました");
            }
        }

        // 自動オンラインチェック
        setInterval(() => {
            friends.forEach(f => {
                const conn = peer.connect('SKR_' + f.id, {metadata: {type:'ping'}});
                conn.on('open', () => { 
                    document.getElementById('dot-'+f.id)?.classList.add('online');
                    conn.close();
                });
                setTimeout(() => { if(conn) conn.close(); }, 3000);
            });
        }, 10000);

        // 管理者モード
        function checkAdminPass() {
            const p = document.getElementById('admin-pass-input').value;
            if (p === '9999999999') {
                isAdmin = true;
                localStorage.setItem('s_admin', 'true');
                adminColor = prompt("管理者の名前の色を選んでください (例: #ff0000 や gold)", "gold");
                localStorage.setItem('s_admin_color', adminColor);
                alert("管理者として認証されました");
                toggleModal('admin-modal', false);
            } else {
                alert("パスコードが違います");
            }
        }

        function toggleModal(id, show) {
            document.getElementById(id).style.display = show ? 'flex' : 'none';
        }

        window.onload = () => { renderFriends(); };
    </script>
</body>
</html>
